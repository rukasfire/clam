<meta charset="utf-8">
<title>日課 — 讀經打卡</title>
<style>
  :root {
    --paper: #F3EEE3; --paper-2: #FBF8F0; --paper-3: #EAE3D2;
    --ink: #2B2622; --ink-2: #6B6355; --ink-3: #9A917E; --line: #D8D0BC;
    --cinnabar: #A63A2B; --cinnabar-soft: rgba(166, 58, 43, 0.09); --gold: #9C7A3C;
    --shadow: 0 24px 60px rgba(43, 38, 34, 0.18); --sheet-shadow: 0 -12px 40px rgba(43, 38, 34, 0.22);
  }
  @media (prefers-color-scheme: dark) {
    :root { --paper: #1B1814; --paper-2: #26211B; --paper-3: #131110; --ink: #EAE1CD; --ink-2: #A99E88; --ink-3: #776F5E; --line: #3A342B; --cinnabar: #D2604C; --cinnabar-soft: rgba(210, 96, 76, 0.14); --gold: #C9A45C; --shadow: 0 24px 60px rgba(0, 0, 0, 0.5); --sheet-shadow: 0 -12px 40px rgba(0, 0, 0, 0.55); }
  }
  :root[data-theme="dark"] { --paper: #1B1814; --paper-2: #26211B; --paper-3: #131110; --ink: #EAE1CD; --ink-2: #A99E88; --ink-3: #776F5E; --line: #3A342B; --cinnabar: #D2604C; --cinnabar-soft: rgba(210, 96, 76, 0.14); --gold: #C9A45C; --shadow: 0 24px 60px rgba(0, 0, 0, 0.5); --sheet-shadow: 0 -12px 40px rgba(0, 0, 0, 0.55); }
  :root[data-theme="light"] { --paper: #F3EEE3; --paper-2: #FBF8F0; --paper-3: #EAE3D2; --ink: #2B2622; --ink-2: #6B6355; --ink-3: #9A917E; --line: #D8D0BC; --cinnabar: #A63A2B; --cinnabar-soft: rgba(166, 58, 43, 0.09); --gold: #9C7A3C; --shadow: 0 24px 60px rgba(43, 38, 34, 0.18); --sheet-shadow: 0 -12px 40px rgba(43, 38, 34, 0.22); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper-3); color: var(--ink);
    font-family: "PingFang TC", "PingFang SC", "Microsoft JhengHei", ui-sans-serif, system-ui, sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .serif { font-family: "Songti TC", "Noto Serif TC", "STSong", "SimSun", ui-serif, serif; }
  .kai { font-family: "Kaiti TC", "STKaiti", "BiauKai", "KaiTi", "Songti TC", ui-serif, serif; }

  .phone { width: 100%; max-width: 640px; height: 100dvh; background: var(--paper); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  @media (min-width: 641px) {
    body { padding: 28px 16px; }
    .phone { height: min(calc(100dvh - 56px), 900px); border-radius: 28px; border: 1px solid var(--line); box-shadow: var(--shadow); }
  }
  .statusbar { height: 54px; flex: none; display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1px solid var(--line); }
  .statusbar .seal-logo-sm { width: 28px; height: 28px; flex: none; border: 2px solid var(--cinnabar); border-radius: 7px; color: var(--cinnabar); display: flex; align-items: center; justify-content: center; font-size: 15px; transform: rotate(-4deg); }
  .statusbar .brand { font-size: 15.5px; font-weight: 600; letter-spacing: 0.12em; flex: 1; }
  .statusbar #tod-label { font-size: 11.5px; color: var(--ink-2); letter-spacing: 0.06em; }
  .screens { flex: 1; position: relative; overflow: hidden; }
  .screen { position: absolute; inset: 0; overflow-y: auto; padding: 16px 20px 24px; display: none; scrollbar-width: thin; }
  .screen.active { display: block; }

  .tabbar { flex: none; height: 64px; border-top: 1px solid var(--line); background: var(--paper); display: flex; align-items: stretch; }
  .tab { flex: 1; border: 0; background: none; cursor: pointer; color: var(--ink-3); font-family: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10.5px; letter-spacing: 0.06em; }
  .tab svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .tab.active { color: var(--cinnabar); }
  .tab:focus-visible { outline: 2px solid var(--cinnabar); outline-offset: -2px; border-radius: 12px; }

  .today-head { display: flex; justify-content: space-between; align-items: flex-start; margin: 10px 2px 16px; }
  .today-head .d1 { font-size: 22px; font-weight: 600; letter-spacing: 0.05em; }
  .today-head .d2 { font-size: 12px; color: var(--ink-2); margin-top: 3px; letter-spacing: 0.06em; }
  .streak { text-align: right; }
  .streak .n { font-size: 26px; font-weight: 600; color: var(--cinnabar); font-variant-numeric: tabular-nums; }
  .streak .l { font-size: 11px; color: var(--ink-2); letter-spacing: 0.12em; }

  .daily-quote { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 20px 18px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: stretch; min-height: 150px; position: relative; overflow: hidden; }
  .daily-quote .vtext { writing-mode: vertical-rl; font-size: 19px; line-height: 2.05; letter-spacing: 0.16em; max-height: 140px; }
  .daily-quote .vsrc { writing-mode: vertical-rl; font-size: 11.5px; color: var(--ink-2); letter-spacing: 0.2em; align-self: flex-end; }
  .daily-quote .q-label { position: absolute; left: 16px; top: 16px; font-size: 10.5px; letter-spacing: 0.28em; color: var(--gold); }

  .sec-label { font-size: 11.5px; letter-spacing: 0.26em; color: var(--ink-2); margin: 20px 2px 10px; display: flex; align-items: center; gap: 10px; }
  .sec-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .empty-note { font-size: 12.5px; color: var(--ink-3); text-align: center; padding: 22px 10px; border: 1px dashed var(--line); border-radius: 14px; line-height: 1.8; }

  .task { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; position: relative; cursor: pointer; text-align: left; width: 100%; font-family: inherit; }
  .task .info { flex: 1; min-width: 0; }
  .task .t-book { font-size: 16px; font-weight: 600; letter-spacing: 0.04em; }
  .task .t-range { font-size: 12.5px; color: var(--ink-2); margin-top: 3px; }
  .task .t-plan { font-size: 10.5px; color: var(--ink-3); margin-top: 5px; letter-spacing: 0.05em; }
  .stamp-btn { flex: none; width: 58px; height: 58px; border: 1.5px dashed var(--ink-3); border-radius: 10px; background: none; cursor: pointer; color: var(--ink-3); font-family: inherit; font-size: 10.5px; letter-spacing: 0.1em; line-height: 1.5; transition: border-color 0.2s, color 0.2s; }
  .stamp-btn:hover { border-color: var(--cinnabar); color: var(--cinnabar); }
  .seal { flex: none; width: 58px; height: 58px; border: 3px solid var(--cinnabar); border-radius: 9px; color: var(--cinnabar); display: flex; align-items: center; justify-content: center; font-size: 30px; transform: rotate(-5deg); background: radial-gradient(circle at 30% 30%, var(--cinnabar-soft), transparent 70%); animation: stamp-in 0.45s cubic-bezier(0.2, 1.6, 0.4, 1); }
  @keyframes stamp-in { 0% { transform: rotate(-14deg) scale(1.9); opacity: 0; } 60% { transform: rotate(-4deg) scale(0.94); opacity: 1; } 100% { transform: rotate(-5deg) scale(1); } }
  @media (prefers-reduced-motion: reduce) { .seal { animation: none; } .sheet, .overlay, .toast { transition: none !important; } }
  .task.done { border-style: solid; border-color: color-mix(in srgb, var(--cinnabar) 35%, var(--line)); }
  .task.finished { opacity: 0.7; cursor: default; }

  .journal-head { margin: 12px 2px 4px; }
  .journal-head h2 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: 0.08em; }
  .journal-head p { font-size: 12px; color: var(--ink-2); margin: 4px 0 0; }
  .entry { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-top: 12px; }
  .entry .e-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-3); letter-spacing: 0.05em; }
  .entry .e-range { font-size: 13.5px; font-weight: 600; margin-top: 7px; letter-spacing: 0.03em; }
  .entry .e-body { font-size: 13.5px; line-height: 1.85; color: var(--ink-2); margin-top: 7px; white-space: pre-wrap; }
  .entry .e-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 11px; letter-spacing: 0.08em; border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; color: var(--ink-2); background: none; font-family: inherit; cursor: pointer; }

  .plan { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 15px; margin-top: 12px; }
  .plan .p-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .plan .p-name { font-size: 15.5px; font-weight: 600; letter-spacing: 0.04em; }
  .plan .p-pct { font-size: 12.5px; color: var(--gold); font-variant-numeric: tabular-nums; flex: none; }
  .plan .p-sub { font-size: 11.5px; color: var(--ink-2); margin-top: 4px; }
  .bar { height: 5px; background: var(--paper-3); border-radius: 99px; margin-top: 12px; overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--gold); border-radius: 99px; }
  .plan.paused .p-name, .plan.paused .p-sub { color: var(--ink-3); }
  .plan.paused .bar i { background: var(--ink-3); }
  .plan .p-actions { display: flex; gap: 14px; margin-top: 10px; }
  .p-actions button { background: none; border: 0; font-family: inherit; font-size: 11.5px; color: var(--ink-3); letter-spacing: 0.06em; cursor: pointer; padding: 0; }
  .p-actions button:hover { color: var(--cinnabar); }

  .new-plan, .add-sutra-btn { width: 100%; margin-top: 12px; border: 1.5px dashed var(--line); background: none; border-radius: 14px; padding: 14px; color: var(--ink-2); font-family: inherit; font-size: 13px; letter-spacing: 0.08em; cursor: pointer; }
  .new-plan:hover, .add-sutra-btn:hover { border-color: var(--gold); color: var(--gold); }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 4px; }
  .stat { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 13px 8px; text-align: center; }
  .stat .n { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 10px; color: var(--ink-2); letter-spacing: 0.1em; margin-top: 3px; }

  .cal { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-top: 12px; }
  .cal .c-head { display: flex; justify-content: space-between; align-items: baseline; }
  .cal .c-title { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; }
  .cal .c-sub { font-size: 11px; color: var(--ink-3); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 14px; }
  .cal-grid .wd { font-size: 10px; color: var(--ink-3); text-align: center; letter-spacing: 0.1em; }
  .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--ink-2); border-radius: 8px; font-variant-numeric: tabular-nums; position: relative; }
  .day.stamped { color: var(--cinnabar); font-weight: 600; border: 1.5px solid var(--cinnabar); transform: rotate(-3deg); background: var(--cinnabar-soft); }
  .day.missed::after { content: ""; position: absolute; inset: auto auto 4px; width: 4px; height: 4px; border-radius: 99px; border: 1px solid var(--ink-3); }
  .day.future { color: var(--ink-3); opacity: 0.5; }
  .day.today-cell { outline: 1.5px dashed var(--gold); outline-offset: -1.5px; }

  .lib-item { background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-top: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; width: 100%; text-align: left; font-family: inherit; }
  .lib-item .li-name { font-size: 15px; font-weight: 600; letter-spacing: 0.03em; }
  .lib-item .li-sub { font-size: 11px; color: var(--ink-2); margin-top: 3px; }
  .badge { flex: none; font-size: 10.5px; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--gold); color: var(--gold); }
  .badge.zhou { border-color: var(--cinnabar); color: var(--cinnabar); }

  .overlay { position: absolute; inset: 0; background: rgba(20, 16, 12, 0.45); opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 5; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; top: 8%; z-index: 6; background: var(--paper); border-radius: 24px 24px 0 0; box-shadow: var(--sheet-shadow); padding: 14px 20px 22px; transform: translateY(105%); transition: transform 0.32s cubic-bezier(0.3, 1, 0.4, 1); display: flex; flex-direction: column; }
  .sheet.show { transform: translateY(0); }
  .sheet.short { top: auto; }
  .sheet .grip { width: 40px; height: 4px; border-radius: 99px; background: var(--line); margin: 0 auto 14px; flex: none; }
  .sheet h3 { margin: 0; font-size: 16.5px; font-weight: 600; letter-spacing: 0.05em; flex: none; }
  .sheet .s-sub { font-size: 12px; color: var(--ink-2); margin-top: 4px; flex: none; }
  .sheet .s-body { flex: 1; overflow-y: auto; margin-top: 14px; }
  .sheet .s-body p { font-size: 15px; line-height: 2.1; margin: 0 0 1em; }
  .sheet textarea { width: 100%; height: 120px; resize: none; background: var(--paper-2); color: var(--ink); border: 1px solid var(--line); border-radius: 12px; font-family: inherit; font-size: 14px; line-height: 1.8; padding: 12px; }
  .sheet input[type=text] { width: 100%; background: var(--paper-2); color: var(--ink); border: 1px solid var(--line); border-radius: 12px; font-family: inherit; font-size: 14px; padding: 11px 12px; margin-bottom: 10px; }
  .sheet textarea:focus, .sheet input:focus { outline: 2px solid var(--gold); outline-offset: -1px; }
  .mood-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; flex: none; }
  .mood { border: 1px solid var(--line); background: none; border-radius: 999px; padding: 6px 14px; font-family: inherit; font-size: 12px; color: var(--ink-2); cursor: pointer; letter-spacing: 0.05em; }
  .mood.on { border-color: var(--gold); color: var(--gold); background: color-mix(in srgb, var(--gold) 8%, transparent); }
  .sheet .save, .sheet .primary { flex: none; width: 100%; margin-top: 14px; background: var(--cinnabar); color: var(--paper-2); border: 0; border-radius: 12px; padding: 14px; font-family: inherit; font-size: 14.5px; letter-spacing: 0.15em; cursor: pointer; }
  .sheet .save:hover, .sheet .primary:hover { filter: brightness(1.06); }
  .sheet .ghost { flex: none; width: 100%; margin-top: 8px; background: none; color: var(--ink-2); border: 1px solid var(--line); border-radius: 12px; padding: 12px; font-family: inherit; font-size: 13px; letter-spacing: 0.1em; cursor: pointer; }

  .picker-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .pick-item { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px; cursor: pointer; background: var(--paper-2); }
  .pick-item.sel { border-color: var(--cinnabar); background: var(--cinnabar-soft); }
  .pick-item .pi-name { font-size: 14px; font-weight: 600; flex: 1; }
  .pick-item .pi-sub { font-size: 11px; color: var(--ink-3); }
  .plan-preview { margin-top: 14px; padding: 12px; border-radius: 12px; background: var(--cinnabar-soft); font-size: 12.5px; color: var(--ink); line-height: 1.7; flex: none; display: none; }
  .plan-preview.show { display: block; }
  .target-row { display: none; align-items: center; justify-content: space-between; margin-top: 14px; flex: none; }
  .target-row.show { display: flex; }
  .mode-row { display: none; align-items: center; justify-content: space-between; margin-top: 14px; flex: none; }
  .mode-row.show { display: flex; }
  .mode-row .opts { display: flex; gap: 8px; }
  .target-label { font-size: 12.5px; color: var(--ink-2); letter-spacing: 0.05em; }
  .stepper { display: flex; align-items: center; gap: 16px; }
  .stepper button { width: 32px; height: 32px; border-radius: 999px; border: 1px solid var(--line); background: var(--paper-2); color: var(--ink); font-size: 17px; cursor: pointer; font-family: inherit; line-height: 1; padding: 0; }
  .stepper button:hover { border-color: var(--gold); color: var(--gold); }
  .stepper span { min-width: 26px; text-align: center; font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .toast { position: absolute; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(16px); background: var(--ink); color: var(--paper); font-size: 12.5px; letter-spacing: 0.08em; padding: 10px 20px; border-radius: 999px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 8; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .foot-note { margin-top: 22px; font-size: 11.5px; color: var(--ink-3); line-height: 1.8; }
</style>

<div class="phone" id="phone">
  <div class="statusbar">
    <div class="seal-logo-sm kai" aria-hidden="true">課</div>
    <div class="brand serif">日課</div>
    <span id="tod-label">晨讀時分</span>
  </div>

  <div class="screens">
    <section class="screen active" id="scr-today">
      <div class="today-head">
        <div><div class="d1 serif" id="today-date">—</div><div class="d2" id="today-sub">—</div></div>
        <div class="streak"><div class="n" id="streak-n">0</div><div class="l">連續日</div></div>
      </div>
      <div class="daily-quote">
        <span class="q-label">今日一句</span>
        <div class="vsrc kai" id="quote-src">—</div>
        <div class="vtext kai" id="quote-text">—</div>
      </div>
      <div class="sec-label">今日功課</div>
      <div id="today-list"></div>
    </section>

    <section class="screen" id="scr-journal">
      <div class="journal-head"><h2 class="serif">心得日誌</h2><p id="journal-sub">尚無心得</p></div>
      <button class="new-plan" onclick="openFreeNote()">＋ 寫新心得</button>
      <div id="entry-list"></div>
    </section>

    <section class="screen" id="scr-plans">
      <div class="journal-head"><h2 class="serif">讀經計畫</h2><p>進度依打卡自動推算</p></div>
      <div class="stats">
        <div class="stat"><div class="n" id="stat-month">0</div><div class="l">本月打卡</div></div>
        <div class="stat"><div class="n" id="stat-longest">0</div><div class="l">最長連續</div></div>
        <div class="stat"><div class="n" id="stat-notes">0</div><div class="l">心得總數</div></div>
      </div>
      <div id="plan-list"></div>
      <button class="new-plan" onclick="openNewPlan()">＋ 建立新計畫</button>
      <div class="cal">
        <div class="c-head"><span class="c-title serif" id="cal-title">—</span><span class="c-sub">硃印為已打卡</span></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </section>

    <section class="screen" id="scr-library">
      <div class="journal-head"><h2 class="serif">經庫</h2><p>正文節錄，不含前後讚偈真言</p></div>
      <div id="lib-list"></div>
      <button class="add-sutra-btn" onclick="openAddSutra()">＋ 新增我的經（經名＋內文）</button>
      <p class="foot-note">經文為正文節錄（不含前後讚偈真言），採用公版古籍譯本。打卡、心得、計畫、自訂經文皆存於本機瀏覽器（localStorage），清除瀏覽器資料會遺失，暫不提供雲端同步。</p>
    </section>
  </div>

  <nav class="tabbar">
    <button class="tab active" data-scr="scr-today" onclick="go(this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2.1 2.1M16.9 16.9L19 19M19 5l-2.1 2.1M7.1 16.9L5 19"/></svg>
      今日
    </button>
    <button class="tab" data-scr="scr-journal" onclick="go(this)">
      <svg viewBox="0 0 24 24"><path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4z"/><path d="M9 9h6M9 13h6"/></svg>
      日誌
    </button>
    <button class="tab" data-scr="scr-plans" onclick="go(this)">
      <svg viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/></svg>
      計畫
    </button>
    <button class="tab" data-scr="scr-library" onclick="go(this)">
      <svg viewBox="0 0 24 24"><path d="M4 5.5c2-1 5-1.2 7 0v14c-2-1.2-5-1-7 0z"/><path d="M20 5.5c-2-1-5-1.2-7 0v14c2-1.2 5-1 7 0z"/></svg>
      經庫
    </button>
  </nav>

  <div class="overlay" id="overlay" onclick="closeSheet()"></div>

  <div class="sheet" id="sheet-read" role="dialog" aria-label="讀經">
    <div class="grip"></div>
    <h3 class="serif" id="read-title">—</h3>
    <div class="s-sub" id="read-sub">—</div>
    <div class="s-body kai" id="read-body"></div>
    <button class="save" id="read-stamp-btn" onclick="stampFromSheet()">蓋印打卡</button>
    <button class="ghost" onclick="writeNoteFromRead()">寫心得</button>
  </div>

  <div class="sheet short" id="sheet-note" role="dialog" aria-label="寫心得">
    <div class="grip"></div>
    <h3 class="serif">今日心得</h3>

「時彼世尊，入三摩地，名曰除滅一切眾生苦惱，既入定已，於肉髻中出大光明，光中演說大陀羅尼曰：『那謨薄伽筏帝，裨殺社窶嚕，薜琉璃缽剌婆喝囉闍也，怛陀揭多耶，阿羅訶帝，三藐三勃陀耶。怛姪阤：唵，鞞殺逝，鞞殺逝，鞞殺社，三沒揭帝娑訶』。」爾時，光中說此咒已，大地震動，放大光明，一切眾生病苦皆除，受安隱樂。

「曼殊室利！若見男子女人有病苦者，應當一心，為彼病人常清淨澡漱，或食或藥，或無蟲水，咒一百八遍，與彼服食，所有病苦悉皆消滅。若有所求，至心念誦，皆得如是無病延年，命終之後，生彼世界，得不退轉，乃至菩提。是故曼殊室利！若有男子、女人，於彼藥師琉璃光如來，至心殷重，恭敬供養者，常持此咒，勿令廢忘。」

「復次、曼殊室利！若有淨信男子女人，得聞藥師琉璃光如來應正等覺所有名號，聞已誦持，晨嚼齒木，澡漱清淨，以諸香花，燒香、塗香，作眾伎樂，供養形像。於此經典，若自書，若教人書，一心受持，聽聞其義。於彼法師，應修供養：一切所有資身之具，悉皆施與，勿令乏少。如是便蒙諸佛護念，所求願滿，乃至菩提。」

爾時，曼殊室利童子白佛言：「世尊！我當誓於像法轉時，以種種方便，令諸淨信善男子、善女人等，得聞世尊藥師琉璃光如來名號，乃至睡中，亦以佛名覺悟其耳。世尊！若於此經受持讀誦，或復為他演說開示，若自書、若教人書，恭敬尊重，以種種華香、塗香、末香、燒香、花鬘、瓔珞、幡蓋、伎樂，而為供養，以五色綵，作囊盛之，掃灑淨處，敷設高座，而用安處。爾時，四大天王與其眷屬，及餘無量百千天眾，皆詣其所，供養守護。世尊！若此經寶流行之處，有能受持，以彼世尊藥師琉璃光如來本願功德，及聞名號，當知是處無復橫死，亦復不為諸惡鬼神奪其精氣，設已奪者，還得如故，身心安樂。」

佛告曼殊室利：「如是！如是！如汝所說。曼殊室利！若有淨信善男子、善女人等，欲供養彼世尊藥師琉璃光如來者，應先造立彼佛形像，敷清淨座而安處之，散種種花，燒種種香，以種種幢幡莊嚴其處。七日七夜，受八分齋戒，食清淨食，澡浴香潔，著清淨衣，應生無垢濁心，無怒害心，於一切有情起利益安樂，慈悲喜捨平等之心，鼓樂歌讚，右遶佛像，復應念彼如來本願功德，讀誦此經，思惟其義，演說開示。隨所樂求，一切皆遂：求長壽，得長壽；求富饒，得富饒；求官位，得官位；求男女，得男女。」

「若復有人，忽得惡夢，見諸惡相，或怪鳥來集，或於住處百怪出現，此人若以眾妙資具，恭敬供養彼世尊藥師琉璃光如來者，惡夢、惡相諸不吉祥，皆悉隱沒，不能為患。或有水火刀毒、懸險惡象、師子虎狼、熊羆毒蛇、惡蠍蜈蚣、蚰蜒蚊虻等佈，若能至心憶念彼佛，恭敬供養，一切怖畏皆得解脫。若他國侵擾，盜賊反亂，憶念恭敬彼如來者，亦皆解脫。」

「復次、曼殊室利！若有淨信善男子、善女人等，乃至盡形不事餘天，唯當一心，歸佛法僧，受持禁戒：若五戒、十戒，菩薩四百戒、苾芻二百五十戒，苾芻尼五百戒，於所受中或有毀犯，怖墮惡趣，若能專念彼佛名號，恭敬供養者，必定不受三惡趣生。或有女人，臨當產時，受於極苦，若能至心稱名禮讚，恭敬供養彼如來者，眾苦皆除，所生之子，身分具足，形色端正，見者歡喜，利根聰明，安隱少病，無有非人，奪其精氣。」

爾時，世尊告阿難言：「如我稱揚彼世尊藥師琉璃光如來所有功德，此是諸佛甚深行處，難可解了，汝為信不？」

阿難白言：「大德世尊！我於如來所說契經不生疑惑，所以者何？一切如來身語意業無不清淨。世尊！此日月輪可令墮落，妙高山王可使傾動，諸佛所言，無有異也。」

「世尊！有諸眾生，信根不具，聞說諸佛甚深行處，作是思惟：云何但念藥師琉璃光如來一佛名號，便獲爾所功德勝利？由此不信，返生誹謗。彼於長夜，失大利樂，墮諸惡趣，流轉無窮。」

佛告阿難：「是諸有情，若聞世尊藥師琉璃光如來名號，至心受持，不生疑惑，墮惡趣者，無有是處。」

「阿難！此是諸佛甚深所行，難可信解，汝今能受，當知皆是如來威力。阿難！一切聲聞、獨覺，及未登地諸菩薩等，皆悉不能如實信解，唯除一生所繫菩薩。阿難！人身難得，於三寶中，信敬尊重，亦難可得；聞世尊藥師琉璃光如來名號，復難於是。」

「阿難！彼藥師琉璃光如來，無量菩薩行，無量善巧方便，無量廣大願，我若一劫，若一劫餘而廣說者，劫可速盡，彼佛行願，善巧方便，無有盡也。」

爾時，眾中有一菩薩摩訶薩，名曰救脫，即從座起，偏袒一肩，右膝著地，曲躬合掌而白佛言：「大德世尊！像法轉時，有諸眾生為種種患之所困厄，長病贏瘦，不能飲食，喉脣乾燥，見諸方暗，死相現前，父母親屬、朋友知識，啼泣圍繞；然彼自身，臥在本處，見琰魔使，引其神識至於琰魔法王之前。然諸有情，有俱生神，隨其所作，若罪若福，皆具書之，盡持授與琰魔法王。爾時，彼王推問其人，計算所作，隨其罪福而處斷之。時彼病人，親屬、知識，若能為彼歸依世尊藥師琉璃光如來，請諸眾僧，轉讀此經，然七層之燈，懸五色續命神幡，或有是處，彼識得還，如在夢中明了自見。或經七日，或二十一日，或三十五日，或四十九日，彼識還時，如從夢覺，皆自憶知善不善業所得果報，由自證見業果報故，乃至命難，亦不造作諸惡之業。是故淨信善男子、善女人等，皆應受持藥師琉璃光如來名號，隨力所能，恭敬供養。」

爾時，阿難問救脫菩薩曰：「善男子！應云何恭敬供養彼世尊藥師琉璃光如來？續命幡燈復云何造？」救脫菩薩言：「大德！若有病人，欲脫病苦，當為其人，七日七夜受持八分齋戒，應以飲食及餘資具，隨力所辦，供養苾芻僧，晝夜六時，禮拜供養彼世尊藥師琉璃光如來，讀誦此經四十九遍，然四十九燈，造彼如來形像七軀，一一像前各置七燈，一一燈量大如車輪，乃至四十九日光明不絕。造五色綵幡，長四十九搩手，應放雜類眾生至四十九，可得過度危厄之難，不為諸橫惡鬼所持。」

「復次、阿難！若剎帝利、灌頂王等，災難起時，所謂：人眾疾疫難，他國侵逼難，自界叛逆難，星宿變怪難，日月薄蝕難，非時風雨難，過時不雨難。彼剎帝利、灌頂王等，爾時應於一切有情起慈悲心，赦諸繫閉。依前所說供養之法，供養彼世尊藥師琉璃光如來。由此善根，及彼如來本願力故，令其國界即得安隱，風雨順時，穀稼成熟，一切有情無病歡樂。於其國中，無有暴惡藥叉等神惱有情者，一切惡相皆即隱沒；而剎帝利、灌頂王等，壽命色力，無病自在，皆得增益。」

「阿難！若帝后妃主，儲君王子，大臣輔相，中宮綵女，百官黎庶，為病所苦，及餘厄難，亦應造立五色神幡，然燈續明，放諸生命，散雜色花，燒眾名香，病得除愈，眾難解脫。」

爾時，阿難問救脫菩薩言：「善男子！云何已盡之命而可增益？」救脫菩薩言：「大德！汝豈不聞如來說有九橫死耶？是故勸造續命幡燈，修諸福德，以修福故，盡其壽命，不經苦患。」阿難問言：「九橫云何？」救脫菩薩言：「若諸有情，得病雖輕，然無醫藥及看病者，設復遇醫，授以非藥，實不應死而便橫死。又信世間邪魔外道妖孽之師，妄說禍福，便生恐動，心不自正，卜問覓禍，殺種種眾生，解奏神明，呼諸魍魎，請乞福祐，欲冀延年，終不能得，愚痴迷惑，信邪倒見，遂令橫死，入於地獄，無有出期，是名初橫。二者、橫被王法之所誅戮。三者、畋獵嬉戲，耽淫嗜酒，放逸無度，橫為非人奪其精氣。四者、橫為火焚。五者、橫為水溺。六者、橫為種種惡獸所噉。七者、橫墮山崖。八者、橫為毒藥、厭禱、咒詛、起屍鬼等之所中害。九者、饑渴所困，不得飲食而便橫死。是為如來略說橫死，有此九種，其餘復有無量諸橫，難可具說。」

「復次、阿難！彼琰魔王主領世間名籍之記，若諸有情，不孝五逆，破辱三寶，壞君臣法，毀於性戒，琰魔法王隨罪輕重，考而罰之。是故我今勸諸有情，然燈造幡，放生修福，令度苦厄，不遭眾難。」

爾時，眾中有十二藥叉大將，俱在會坐，所謂：宮毘羅大將，伐折羅大將，迷企羅大將，安底羅大將，頞你羅大將，珊底羅大將，因達羅大將，波夷羅大將，摩虎羅大將，真達羅大將，招杜羅大將，毘羯魔大將，此十二藥叉大將，一一各有七千藥叉，以為眷屬。

同時舉聲白佛言：「世尊！我等今者蒙佛威力，得聞世尊藥師琉璃光如來名號，不復更有惡趣之怖。我等相率，皆同一心，乃至盡形，歸佛法僧，誓當荷負一切有情，為作義利，饒益安樂。隨於何等村城國邑，空閑林中，若有流布此經，或復受持藥師琉璃光如來名號，恭敬供養者，我等眷屬衛護是人，皆使解脫一切苦難，諸有願求，悉令滿足。或有疾厄求度脫者，亦應讀誦此經，以五色縷，結我名字，得如願已，然後解結。」

爾時，世尊讚諸藥叉大將言：「善哉！善哉！大藥叉將！汝等念報世尊藥師琉璃光如來恩德者，常應如是利益安樂一切有情。」

爾時，阿難白佛言：「世尊！當何名此法門？我等云何奉持？」佛告阿難：「此法門名說藥師琉璃光如來本願功德，亦名說十二神將饒益有情結願神咒，亦名拔除一切業障，應如是持。」

時薄伽梵說是語已，諸菩薩摩訶薩，及大聲聞，國王、大臣、婆羅門、居士、天、龍、藥叉、健達縛、阿素洛、揭路荼、緊捺洛、莫呼洛伽、人、非人等一切大眾，聞佛所說，皆大歡喜，信受奉行。`);

["無得無說分第七","「須菩提！於意云何？如來得阿耨多羅三藐三菩提耶？如來有所說法耶？」\n\n須菩提言：「如我解佛所說義，無有定法，名『阿耨多羅三藐三菩提』，亦無有定法，如來可說。何以故？如來所說法，皆不可取、不可說；非法，非非法。所以者何？一切賢聖，皆以無為法而有差別。」"],
["依法出生分第八","「須菩提！於意云何？若人滿三千大千世界七寶以用布施，是人所得福德，寧為多不？」\n\n須菩提言：「甚多，世尊！何以故？是福德即非福德性，是故如來說福德多。」\n\n「若復有人，於此經中受持，乃至四句偈等，為他人說，其福勝彼。何以故？須菩提！一切諸佛，及諸佛阿耨多羅三藐三菩提法，皆從此經出。須菩提！所謂佛法者，即非佛法，是名佛法。」"],
["一相無相分第九","「須菩提！於意云何？須陀洹能作是念：『我得須陀洹果』不？」須菩提言：「不也，世尊！何以故？須陀洹名為入流，而無所入；不入色、聲、香、味、觸、法，是名須陀洹。」\n\n「須菩提！於意云何？斯陀含能作是念：『我得斯陀含果』不？」須菩提言：「不也，世尊！何以故？斯陀含名一往來，而實無往來，是名斯陀含。」\n\n「須菩提！於意云何？阿那含能作是念：『我得阿那含果』不？」須菩提言：「不也，世尊！何以故？阿那含名為不來，而實無不來，是故名阿那含。」\n\n「須菩提！於意云何？阿羅漢能作是念：『我得阿羅漢道』不？」須菩提言：「不也，世尊！何以故？實無有法名阿羅漢。世尊！若阿羅漢作是念：『我得阿羅漢道』即為著我、人、眾生、壽者。世尊！佛說我得無諍三昧，人中最為第一，是第一離欲阿羅漢。世尊！我不作是念：『我是離欲阿羅漢。』世尊！我若作是念：『我得阿羅漢道。』世尊則不說須菩提是樂阿蘭那行者。以須菩提實無所行，而名須菩提，是樂阿蘭那行。」"],
["莊嚴淨土分第十","佛告須菩提：「於意云何？如來昔在燃燈佛所，於法有所得不？」「不也，世尊！如來在燃燈佛所，於法實無所得。」\n\n「須菩提！於意云何？菩薩莊嚴佛土不？」「不也，世尊！何以故？莊嚴佛土者，即非莊嚴，是名莊嚴。」\n\n「是故，須菩提！諸菩薩摩訶薩，應如是生清淨心，不應住色生心，不應住聲、香、味、觸、法生心，應無所住而生其心。」\n\n「須菩提！譬如有人，身如須彌山王，於意云何？是身為大不？」須菩提言：「甚大，世尊！何以故？佛說非身，是名大身。」"],
["無為福勝分第十一","「須菩提！如恆河中所有沙數，如是沙等恆河，於意云何？是諸恆河沙，寧為多不？」須菩提言：「甚多，世尊！但諸恆河，尚多無數，何況其沙。」\n\n「須菩提！我今實言告汝：若有善男子、善女人，以七寶滿爾所恆河沙數三千大千世界，以用布施，得福多不？」須菩提言：「甚多，世尊！」\n\n佛告須菩提：「若善男子、善女人，於此經中，乃至受持四句偈等，為他人說，而此福德，勝前福德。」"],
["尊重正教分第十二","「復次，須菩提！隨說是經，乃至四句偈等，當知此處，一切世間，天、人、阿修羅，皆應供養，如佛塔廟。何況有人，盡能受持讀誦。須菩提！當知是人成就最上第一希有之法，若是經典所在之處，即為有佛，若尊重弟子。」"],
["如法受持分第十三","爾時，須菩提白佛言：「世尊！當何名此經？我等云何奉持？」\n\n佛告須菩提：「是經名為金剛般若波羅蜜，以是名字，汝當奉持。所以者何？須菩提！佛說般若波羅蜜，即非般若波羅蜜，是名般若波羅蜜。須菩提！於意云何？如來有所說法不？」須菩提白佛言：「世尊！如來無所說。」\n\n「須菩提！於意云何？三千大千世界所有微塵，是為多不？」須菩提言：「甚多，世尊！」\n\n「須菩提！諸微塵，如來說非微塵，是名微塵。如來說：世界，非世界，是名世界。須菩提！於意云何？可以三十二相見如來不？」「不也，世尊！不可以三十二相得見如來。何以故？如來說：三十二相，即是非相，是名三十二相。」\n\n「須菩提！若有善男子、善女人，以恆河沙等身命布施；若復有人，於此經中，乃至受持四句偈等，為他人說，其福甚多！」"],
["離相寂滅分第十四","爾時，須菩提聞說是經，深解義趣，涕淚悲泣，而白佛言：「希有世尊！佛說如是甚深經典，我從昔來所得慧眼，未曾得聞如是之經。世尊！若復有人，得聞是經，信心清淨，則生實相，當知是人，成就第一希有功德。世尊！是實相者，則是非相，是故如來說名實相。世尊！我今得聞如是經典，信解受持，不足為難；若當來世，後五百歲，其有眾生，得聞是經，信解受持，是人則為第一希有。何以故？此人無我相、無人相、無眾生相、無壽者相。所以者何？我相，即是非相；人相、眾生相、壽者相，即是非相。何以故？離一切諸相，則名諸佛。」\n\n佛告須菩提：「如是，如是！若復有人，得聞是經，不驚、不怖、不畏，當知是人，甚為希有。何以故？須菩提！如來說：第一波羅蜜，即非第一波羅蜜，是名第一波羅蜜。須菩提！忍辱波羅蜜，如來說非忍辱波羅蜜，是名忍辱波羅密。何以故？須菩提！如我昔為歌利王割截身體，我於爾時，無我相、無人相、無眾生相、無壽者相。何以故？我於往昔，節節支解時，若有我相、人相、眾生相、壽者相，應生瞋恨。須菩提！又念過去，於五百世，作忍辱仙人，於爾所世，無我相、無人相、無眾生相、無壽者相。是故須菩提！菩薩應離一切相，發阿耨多羅三藐三菩提心。不應住色生心，不應住聲、香、味、觸、法生心，應生無所住心。若心有住，則為非住。」\n\n「是故佛說：菩薩心不應住色布施。須菩提！菩薩為利益一切眾生故，應如是布施。如來說：一切諸相，即是非相。又說：一切眾生，即非眾生。須菩提！如來是真語者、實語者、如語者、不誑語者、不異語者。」\n\n「須菩提！如來所得法，此法無實無虛。須菩提！若菩薩心住於法而行布施，如人入闇，則無所見；若菩薩心不住法而行布施，如人有目，日光明照，見種種色。」\n\n「須菩提！當來之世，若有善男子、善女人，能於此經，受持讀誦，則為如來，以佛智慧，悉知是人，悉見是人，皆得成就無量無邊功德。」"],
["持經功德分第十五","「須菩提！若有善男子、善女人，初日分以恆河沙等身布施，中日分復以恆河沙等身布施，後日分亦以恆河沙等身布施，如是無量百千萬億劫，以身布施；若復有人，聞此經典，信心不逆，其福勝彼，何況書寫、受持、讀誦、為人解說。」\n\n「須菩提！以要言之，是經有不可思議、不可稱量、無邊功德。如來為發大乘者說，為發最上乘者說。若有人能受持讀誦，廣為人說，如來悉知是人，悉見是人，皆得成就不可量、不可稱、無有邊、不可思議功德。」\n\n「如是人等，則為荷擔如來阿耨多羅三藐三菩提。何以故？須菩提！若樂小法者，著我見、人見、眾生見、壽者見，則於此經不能聽受、讀誦，為人解說。」\n\n「須菩提！在在處處，若有此經，一切世間，天、人、阿修羅，所應供養；當知此處，則為是塔，皆應恭敬，作禮圍遶，以諸華香而散其處。」"],
["能淨業障分第十六","「復次，須菩提！善男子、善女人，受持讀誦此經，若為人輕賤，是人先世罪業，應墮惡道，以今世人輕賤故，先世罪業則為消滅，當得阿耨多羅三藐三菩提。」\n\n「須菩提！我念過去無量阿僧祇劫，於燃燈佛前，得值八百四千萬億那由他諸佛，悉皆供養承事，無空過者；若復有人，於後末世，能受持讀誦此經，所得功德，於我所供養諸佛功德，百分不及一，千萬億分、乃至算數譬喻所不能及。」\n\n「須菩提！若善男子，善女人，於後末世，有受持讀誦此經，所得功德，我若具說者，或有人聞，心則狂亂，狐疑不信。須菩提！當知是經義不可思議，果報亦不可思議！」"],
["究竟無我分第十七","爾時，須菩提白佛言：「世尊！善男子、善女人，發阿耨多羅三藐三菩提心，云何應住？云何降伏其心？」\n\n佛告須菩提：「善男子、善女人，發阿耨多羅三藐三菩提心者，當生如是心：我應滅度一切眾生。滅度一切眾生已，而無有一眾生實滅度者。何以故？須菩提！若菩薩有我相、人相、眾生相、壽者相，則非菩薩。所以者何？須菩提！實無有法，發阿耨多羅三藐三菩提心者。」\n\n「須菩提！於意云何？如來於燃燈佛所，有法得阿耨多羅三藐三菩提不？」「不也，世尊！如我解佛所說義，佛於燃燈佛所，無有法得阿耨多羅三藐三菩提。」\n\n佛言：「如是，如是！須菩提！實無有法，如來得阿耨多羅三藐三菩提。須菩提！若有法，如來得阿耨多羅三藐三菩提者，燃燈佛則不與我授記：『汝於來世，當得作佛，號釋迦牟尼。』以實無有法得阿耨多羅三藐三菩提，是故燃燈佛與我授記，作是言：『汝於來世，當得作佛，號釋迦牟尼。』何以故？如來者，即諸法如義。」\n\n「若有人言：如來得阿耨多羅三藐三菩提。須菩提！實無有法，佛得阿耨多羅三藐三菩提。須菩提！如來所得阿耨多羅三藐三菩提，於是中無實無虛。是故如來說：一切法皆是佛法。須菩提！所言一切法者，即非一切法，是故名一切法。」\n\n「須菩提！譬如人身長大。」須菩提言：「世尊！如來說：人身長大，則為非大身，是名大身。」\n\n「須菩提！菩薩亦如是。若作是言：我當滅度無量眾生，則不名菩薩。何以故？須菩提！實無有法名為菩薩。是故佛說一切法，無我、無人、無眾生、無壽者。」\n\n「須菩提！若菩薩作是言：『我當莊嚴佛土』，是不名菩薩。何以故？如來說：莊嚴佛土者，即非莊嚴，是名莊嚴。」\n\n「須菩提！若菩薩通達無我、法者，如來說名真是菩薩。」"],
["一體同觀分第十八","「須菩提！於意云何？如來有肉眼不？」「如是，世尊！如來有肉眼。」「須菩提！於意云何？如來有天眼不？」「如是，世尊！如來有天眼。」「須菩提！於意云何？如來有慧眼不？」「如是，世尊！如來有慧眼。」「須菩提！於意云何？如來有法眼不？」「如是，世尊！如來有法眼。」「須菩提！於意云何？如來有佛眼不？」「如是，世尊！如來有佛眼。」\n\n「須菩提！於意云何？如恆河中所有沙，佛說是沙不？」「如是，世尊！如來說是沙。」\n\n「須菩提！於意云何？如一恆河中所有沙，有如是沙等恆河，是諸恆河所有沙數，佛世界如是，寧為多不？」「甚多，世尊。」\n\n佛告須菩提：「爾所國土中，所有眾生，若干種心，如來悉知。何以故？如來說：諸心皆為非心，是名為心。所以者何？須菩提！過去心不可得，現在心不可得，未來心不可得。」"],
["法界通化分第十九","「須菩提！於意云何？若有人滿三千大千世界七寶，以用布施，是人以是因緣，得福多不？」「如是，世尊！此人以是因緣，得福甚多。」\n\n「須菩提！若福德有實，如來不說得福德多；以福德無故，如來說得福德多。」"],
["離色離相分第二十","「須菩提！於意云何？佛可以具足色身見不？」「不也，世尊！如來不應以具足色身見。何以故？如來說：具足色身，即非具足色身，是名具足色身。」\n\n「須菩提！於意云何？如來可以具足諸相見不？」「不也，世尊！如來不應以具足諸相見。何以故？如來說：諸相具足，即非具足。是名諸相具足。」"],
["非說所說分第二十一","「須菩提！汝勿謂如來作是念：『我當有所說法。』莫作是念。何以故？若人言：如來有所說法，即為謗佛，不能解我所說故。須菩提！說法者，無法可說，是名說法。」\n\n爾時，慧命須菩提白佛言：「世尊！頗有眾生，於未來世，聞說是法，生信心不？」\n\n佛言：「須菩提！彼非眾生，非不眾生。何以故？須菩提！眾生眾生者，如來說非眾生，是名眾生。」"],
["無法可得分第二十二","須菩提白佛言：「世尊！佛得阿耨多羅三藐三菩提。為無所得耶？」\n\n佛言：「如是，如是。須菩提！我於阿耨多羅三藐三菩提乃至無有少法可得，是名阿耨多羅三藐三菩提。」"],
["淨心行善分第二十三","「復次，須菩提！是法平等，無有高下，是名『阿耨多羅三藐三菩提』；以無我、無人、無眾生、無壽者，修一切善法，則得阿耨多羅三藐三菩提。須菩提！所言善法者，如來說即非善法，是名善法。」"],
["福智無比分第二十四","「須菩提！若三千大千世界中，所有諸須彌山王，如是等七寶聚，有人持用布施；若人以此《般若波羅蜜經》，乃至四句偈等，受持讀誦，為他人說，於前福德百分不及一，百千萬億分、乃至算數譬喻所不能及。」"],
["化無所化分第二十五","「須菩提！於意云何？汝等勿謂如來作是念：『我當度眾生。』須菩提！莫作是念。何以故？實無有眾生如來度者。若有眾生如來度者，如來則有我、人、眾生、壽者。須菩提！如來說：『有我者，則非有我，而凡夫之人以為有我。』須菩提！凡夫者，如來說則非凡夫，是名凡夫。」"],
["法身非相分第二十六","「須菩提！於意云何？可以三十二相觀如來不？」須菩提言：「如是！如是！以三十二相觀如來。」\n\n佛言：「須菩提！若以三十二相觀如來者，轉輪聖王則是如來。」須菩提白佛言：「世尊！如我解佛所說義，不應以三十二相觀如來。」\n\n爾時，世尊而說偈言：「若以色見我，以音聲求我，是人行邪道，不能見如來。」"],
["無斷無滅分第二十七","「須菩提！汝若作是念：『如來不以具足相故，得阿耨多羅三藐三菩提。』須菩提！莫作是念：『如來不以具足相故，得阿耨多羅三藐三菩提。』」\n\n「須菩提！汝若作是念，發阿耨多羅三藐三菩提心者，說諸法斷滅。莫作是念！何以故？發阿耨多羅三藐三菩提心者，於法不說斷滅相。」"],
["不受不貪分第二十八","「須菩提！若菩薩以滿恆河沙等世界七寶持用布施；若復有人，知一切法無我，得成於忍，此菩薩勝前菩薩所得功德。何以故？須菩提！以諸菩薩不受福德故。」\n\n須菩提白佛言：「世尊！云何菩薩不受福德？」「須菩提！菩薩所作福德，不應貪著。是故說不受福德。」"],
["威儀寂靜分第二十九","「須菩提！若有人言：如來若來若去，若坐若臥，是人不解我所說義。何以故？如來者，無所從來，亦無所去，故名如來。」"],
["一合理相分第三十","「須菩提！若善男子、善女人，以三千大千世界碎為微塵，於意云何？是微塵眾寧為多不？」\n\n須菩提言：「甚多，世尊！何以故？若是微塵眾實有者，佛則不說是微塵眾。所以者何？佛說微塵眾，則非微塵眾，是名微塵眾。」\n\n「世尊！如來所說三千大千世界，則非世界，是名世界。何以故？若世界實有者，則是一合相。如來說一合相，則非一合相，是名一合相。」\n\n「須菩提！一合相者，則是不可說；但凡夫之人貪著其事。」"],
["知見不生分第三十一","「須菩提！若人言：佛說我見、人見、眾生見、壽者見。須菩提！於意云何？是人解我所說義不？」\n\n「不也，世尊！是人不解如來所說義。何以故？世尊說我見、人見、眾生見、壽者見，即非我見、人見、眾生見、壽者見，是名我見、人見、眾生見、壽者見。」\n\n「須菩提！發阿耨多羅三藐三菩提心者，於一切法，應如是知，如是見，如是信解，不生法相。須菩提！所言法相者，如來說即非法相，是名法相。」"],
["應化非真分第三十二","「須菩提！若有人以滿無量阿僧祇世界七寶，持用布施；若有善男子、善女人，發菩提心者，持於此經，乃至四句偈等，受持讀誦，為人演說，其福勝彼。云何為人演說，不取於相，如如不動。何以故？」\n\n「一切有為法，如夢幻泡影，如露亦如電，應作如是觀。」\n\n佛說是經已，長老須菩提及諸比丘、比丘尼、優婆塞、優婆夷，一切世間天、人、阿修羅，聞佛所說，皆大歡喜，信受奉行。"]

["卷上","忉利天宮神通品第一","如是我聞：一時，佛在忉利天，為母說法。爾時，十方無量世界，不可說不可說一切諸佛，及大菩薩摩訶薩，皆來集會，讚歎釋迦牟尼佛，能於五濁惡世，現不可思議大智慧神通之力，調伏剛強眾生，知苦樂法，各遣侍者，問訊世尊。是時，如來含笑，放百千萬億大光明雲——所謂大圓滿光明雲、大慈悲光明雲、大智慧光明雲、大般若光明雲、大三昧光明雲、大吉祥光明雲、大福德光明雲、大功德光明雲、大歸依光明雲、大讚歎光明雲。放如是等不可說光明雲已，又出種種微妙之音——所謂檀波羅蜜音、尸波羅蜜音、羼提波羅蜜音、毘離耶波羅蜜音、禪波羅蜜音、般若波羅蜜音、慈悲音、喜捨音、解脫音、無漏音、智慧音、大智慧音、獅子吼音、大獅子吼音、雲雷音、大雲雷音。\n\n出如是等不可說不可說音已，娑婆世界及他方國土，有無量億天龍鬼神，亦集到忉利天宮。所謂四天王天、忉利天、須焰摩天、兜率陀天、化樂天、他化自在天、梵眾天、梵輔天、大梵天、少光天、無量光天、光音天、少淨天、無量淨天、遍淨天、福生天、福愛天、廣果天、無想天、無煩天、無熱天、善見天、善現天、色究竟天、摩醯首羅天，乃至非想非非想處天，一切天眾、龍眾、鬼神等眾，悉來集會。\n\n復有他方國土，及娑婆世界海神、江神、河神、樹神、山神、地神、川澤神、苗稼神、晝神、夜神、空神、天神、飲食神、草木神，如是等神，皆來集會。復有他方國土，及娑婆世界諸大鬼王——所謂惡目鬼王、噉血鬼王、噉精氣鬼王、噉胎卵鬼王、行病鬼王、攝毒鬼王、慈心鬼王、福利鬼王、大愛敬鬼王，如是等鬼王，皆來集會。\n\n爾時，釋迦牟尼佛告文殊師利法王子菩薩摩訶薩：「汝觀是一切諸佛菩薩，及天龍鬼神，此世界，他世界，此國土，他國土，如是今來集會，到忉利天者，汝知數不？」\n\n文殊師利白佛言：「世尊！若以我神力，千劫測度，不能得知。」\n\n佛告文殊師利：「吾以佛眼觀故，猶不盡數。此皆是地藏菩薩久遠劫來，已度、當度、未度，已成就、當成就、未成就。」\n\n文殊師利白佛言：「世尊！我已過去久修善根，證無礙智，聞佛所言，即當信受。小果聲聞、天龍八部，及未來世諸眾生等，雖聞如來誠實之語，必懷疑惑，設使頂受，未免興謗。唯願世尊，廣說地藏菩薩摩訶薩因地作何行、立何願，而能成就不思議事？」\n\n佛告文殊師利：「譬如三千大千世界，所有草木叢林，稻麻竹葦，山石微塵，一物一數，作一恆河，一恆河沙，一沙一界，一界之內，一塵一劫，一劫之內，所積塵數，盡充為劫。地藏菩薩證十地果位已來，千倍多於上喻。何況地藏菩薩在聲聞、辟支佛地。文殊師利！此菩薩威神誓願，不可思議。若未來世，有善男子、善女人，聞是菩薩名字，或讚歎，或瞻禮，或稱名，或供養，乃至彩畫、刻鏤、塑漆形像，是人當得百返生於三十三天，永不墮惡道。」\n\n「文殊師利！是地藏菩薩摩訶薩，於過去久遠不可說不可說劫前，身為大長者子。時世有佛，號曰獅子奮迅具足萬行如來。時長者子，見佛相好，千福莊嚴，因問彼佛：『作何行願，而得此相？』時獅子奮迅具足萬行如來告長者子：『欲證此身，當須久遠度脫一切受苦眾生。』」\n\n「文殊師利！時長者子，因發願言：『我今盡未來際不可計劫，為是罪苦六道眾生，廣設方便，盡令解脫，而我自身，方成佛道。』以是於彼佛前，立斯大願，於今百千萬億那由他不可說劫，尚為菩薩。」\n\n「又於過去，不可思議阿僧祇劫，時世有佛，號曰覺華定自在王如來。彼佛壽命，四百千萬億阿僧祇劫。像法之中，有一婆羅門女，宿福深厚，眾所欽敬；行住坐臥，諸天衛護。其母信邪，常輕三寶。是時聖女，廣設方便，勸誘其母，令生正見。而此女母，未全生信，不久命終，魂神墮在無間地獄。時婆羅門女，知母在世不信因果，計當隨業，必生惡趣。遂賣家宅，廣求香華，及諸供具，於先佛塔寺，大興供養。見覺華定自在王如來，其形像在一寺中，塑畫威容，端嚴畢備。時婆羅門女，瞻禮尊容，倍生敬仰。私自念言：『佛名大覺，具一切智，若在世時，我母死後，儻來問佛，必知處所。』時婆羅門女，垂泣良久，瞻戀如來。忽聞空中聲曰：『泣者聖女！勿至悲哀，我今示汝母之去處。』婆羅門女合掌向空，而白空曰：『是何神德，寬我憂慮。我自失母已來，晝夜憶戀，無處可問知母生界。』時空中有聲，再報女曰：『我是汝所瞻禮者，過去覺華定自在王如來。見汝憶母，倍於常情眾生之分，故來告示。』婆羅門女聞此聲已，舉身自撲，支節皆損。左右扶持，良久方蘇，而白空曰：『願佛慈憫，速說我母生界。我今身心，將死不久。』時覺華定自在王如來告聖女曰：『汝供養畢，但早返舍。端坐思惟吾之名號，即當知母所生去處。』」\n\n「時婆羅門女，尋禮佛已，即歸其舍。以憶母故，端坐念覺華定自在王如來，經一日一夜。忽見自身，到一海邊。其水涌沸，多諸惡獸，盡復鐵身，飛走海上，東西馳逐。見諸男子女人，百千萬數，出沒海中，被諸惡獸爭取食噉。又見夜叉，其形各異，或多手多眼，多足多頭，口牙外出，利刃如劍，驅諸罪人，使近惡獸，復自搏攫，頭足相就。其形萬類，不敢久視。時婆羅門女，以念佛力故，自然無懼。」\n\n「有一鬼王，名曰無毒，稽首來迎，白聖女曰：『善哉！菩薩何緣來此？』時婆羅門女問鬼王曰：『此是何處？』無毒答曰：『此是大鐵圍山西面第一重海。』聖女問曰：『我聞鐵圍之內，地獄在中，是事實不？』無毒答曰：『實有地獄。』聖女問曰：『我今云何，得到獄所？』無毒答曰：『若非威神，即須業力，非此二事，終不能到。』聖女又問：『此水何緣，而乃涌沸？多諸罪人，及以惡獸？』無毒答曰：『此是閻浮提造惡眾生新死之者，經四十九日後，無人繼嗣為作功德，救拔苦難，生時又無善因，當據本業所感地獄，自然先渡此海。海東十萬由旬，又有一海，其苦倍此。彼海之東，又有一海，其苦復倍。三業惡因之所招感，共號業海，其處是也。』聖女又問鬼王無毒曰：『地獄何在？』無毒答曰：『三海之內，是大地獄，其數百千，各各差別。所謂大者，具有十八。次有五百，苦毒無量。次有千百，亦無量苦。』聖女又問大鬼王曰：『我母死來未久，不知魂神當至何趣？』鬼王問聖女曰：『菩薩之母，在生習何行業？』聖女答曰：『我母邪見，譏毀三寶。設或暫信，旋又不敬。死雖日淺，未知生處。』無毒問曰：『菩薩之母，姓氏何等？』聖女答曰：『我父我母，俱婆羅門種。父號尸羅善現，母號悅帝利。』無毒合掌，啟菩薩曰：『願聖者卻返本處，無至憂憶悲戀。悅帝利罪女，生天以來，經今三日。云承孝順之子，為母設供、修福，布施覺華定自在王如來塔寺。非唯菩薩之母得脫地獄，應是無間罪人，此日悉得受樂，俱同生訖。』鬼王言畢，合掌而退。婆羅門女，尋如夢歸。悟此事已，便於覺華定自在王如來塔像之前，立弘誓願：『願我盡未來劫，應有罪苦眾生，廣設方便，使令解脫。』」\n\n佛告文殊師利：「時鬼王無毒者，當今財首菩薩是。婆羅門女者，即地藏菩薩是。」"],
["卷上","分身集會品第二","爾時，百千萬億不可思、不可議、不可量、不可說、無量阿僧祇世界，所有地獄處，分身地藏菩薩，俱來集在忉利天宮。以如來神力故，各以方面，與諸得解脫從業道出者，亦各有千萬億那由他數，共持香華，來供養佛。彼諸同來等輩，皆因地藏菩薩教化，永不退轉於阿耨多羅三藐三菩提。是諸眾等，久遠劫來，流浪生死，六道受苦，暫無休息。以地藏菩薩廣大慈悲，深誓願故，各獲果證。既至忉利，心懷踴躍，瞻仰如來，目不暫捨。\n\n爾時，世尊舒金色臂，摩百千萬億不可思、不可議、不可量、不可說、無量阿僧祇世界諸分身地藏菩薩摩訶薩頂，而作是言：「吾於五濁惡世，教化如是剛強眾生，令心調伏，捨邪歸正。十有一二，尚惡習在。吾亦分身千百億，廣設方便。或有利根，聞即信受。或有善果，勤勸成就。或有暗鈍，久化方歸。或有業重，不生敬仰。如是等輩眾生，各各差別，分身度脫。或現男子身，或現女人身，或現天龍身，或現神鬼身，或現山林川原、河池泉井，利及於人，悉皆度脫。或現天帝身，或現梵王身，或現轉輪王身，或現居士身，或現國王身，或現宰輔身，或現官屬身，或現比丘、比丘尼、優婆塞、優婆夷身，乃至聲聞、羅漢、辟支佛、菩薩等身，而以化度，非但佛身，獨現其前。汝觀吾累劫勤苦，度脫如是等難化剛強罪苦眾生。其有未調伏者，隨業報應。若墮惡趣，受大苦時，汝當憶念吾在忉利天宮，殷勤付囑，令娑婆世界，至彌勒出世已來眾生，悉使解脫，永離諸苦，遇佛授記。」\n\n爾時，諸世界分身地藏菩薩，共復一形，涕淚哀戀，白其佛言：「我從久遠劫來，蒙佛接引，使獲不可思議神力，具大智慧。我所分身，遍滿百千萬億恆河沙世界。每一世界，化百千萬億身。每一身，度百千萬億人，令歸敬三寶，永離生死，至涅槃樂。但於佛法中，所為善事，一毛一渧，一沙一塵，或毫髮許，我漸度脫，使獲大利。唯願世尊不以後世惡業眾生為慮。」如是三白佛言：「唯願世尊不以後世惡業眾生為慮。」\n\n爾時，佛讚地藏菩薩言：「善哉！善哉！吾助汝喜。汝能成就久遠劫來，發弘誓願，廣度將畢，即證菩提。」"],
["卷上","觀眾生業緣品第三","爾時，佛母摩耶夫人，恭敬合掌，問地藏菩薩言：「聖者！閻浮眾生，造業差別，所受報應，其事云何？」\n\n地藏答言：「千萬世界，乃及國土，或有地獄，或無地獄，或有女人，或無女人，或有佛法，或無佛法，乃至聲聞、辟支佛，亦復如是。非但地獄，罪報一等。」摩耶夫人重白菩薩：「且願聞於閻浮罪報，所感惡趣。」地藏答言：「聖母！唯願聽受，我粗說之。」佛母白言：「願聖者說。」\n\n爾時，地藏菩薩白聖母言：「南閻浮提罪報，名號如是：若有眾生，不孝父母，或至殺害，當墮無間地獄，千萬億劫，求出無期。若有眾生，出佛身血，毀謗三寶，不敬尊經，亦當墮於無間地獄，千萬億劫，求出無期。若有眾生，侵損常住，玷污僧尼，或伽藍內，恣行淫慾，或殺或害，如是等輩，當墮無間地獄，千萬億劫，求出無期。若有眾生，偽作沙門，心非沙門，破用常住，欺誑白衣，違背戒律，種種造惡，如是等輩，當墮無間地獄，千萬億劫，求出無期。若有眾生，偷竊常住財物穀米、飲食衣服，乃至一物不與取者，當墮無間地獄，千萬億劫，求出無期。」\n\n地藏白言：「聖母！若有眾生，作如是罪，當墮五無間地獄，求暫停苦，一念不得。」\n\n摩耶夫人重白地藏菩薩言：「云何名為無間地獄？」\n\n地藏白言：「聖母！諸有地獄，在大鐵圍山之內。其大地獄，有一十八所。次有五百，名號各別。次有千百，名字亦別。無間獄者，其獄城周匝八萬余里，其城純鐵，高一萬里，城上火聚，少有空缺。其獄城中，諸獄相連，名號各別。\n\n「獨有一獄，名曰無間。其獄周匝萬八千里，獄墻高一千里，悉是鐵圍，上火徹下，下火徹上，鐵蛇鐵狗，吐火馳逐，獄墻之上，東西而走。獄中有床，遍滿萬里。一人受罪，自見其身，遍臥滿床。千萬人受罪，亦各自見，身滿床上。眾業所感，獲報如是。又諸罪人，備受眾苦。千百夜叉，及以惡鬼，口牙如劍，眼如電光，手復銅爪，拖拽罪人。復有夜叉，執大鐵戟，中罪人身，或中口鼻，或中腹背，拋空翻接，或置床上。復有鐵鷹，啗罪人目。復有鐵蛇，繳罪人頸。百肢節內，悉下長釘，拔舌耕犁，抽腸剉斬，洋銅灌口，熱鐵纏身。萬死千生，業感如是。動經億劫，求出無期。此界壞時，寄生他界。他界次壞，轉寄他方。他方壞時，展轉相寄。此界成後，還復而來。無間罪報，其事如是。\n\n「又五事業感，故稱無間。何等為五？一者，日夜受罪，以至劫數，無時間絕，故稱無間。二者，一人亦滿，多人亦滿，故稱無間。三者，罪器叉棒，鷹蛇狼犬，碓磨鋸鑿，剉斫鑊湯，鐵網鐵繩，鐵驢鐵馬，生革絡首，熱鐵澆身，飢吞鐵丸，渴飲鐵汁，從年竟劫，數那由他，苦楚相連，更無間斷，故稱無間。四者，不問男子女人，羗胡夷狄，老幼貴賤，或龍或神，或天或鬼，罪行業感，悉同受之，故稱無間。五者，若墮此獄，從初入時，至百千劫，一日一夜，萬死萬生，求一念間，暫住不得，除非業盡，方得受生。以此連綿，故稱無間。」\n\n地藏菩薩白聖母言：「無間地獄，粗說如是。若廣說地獄罪器等名，及諸苦事，一劫之中，求說不盡。」\n\n摩耶夫人聞已，愁憂合掌，頂禮而退。"],
["卷上","閻浮眾生業感品第四","爾時，地藏菩薩摩訶薩白佛言：「世尊！我承佛如來威神力故，遍百千萬億世界，分是身形，救拔一切業報眾生。若非如來大慈力故，即不能作如是變化。我今又蒙佛付囑，至阿逸多成佛已來，六道眾生，遣令度脫。唯然，世尊，願不有慮。」\n\n爾時，佛告地藏菩薩：「一切眾生，未解脫者，性識無定。惡習結業，善習結果，為善為惡，逐境而生。輪轉五道，暫無休息，動經塵劫，迷惑障難。如魚遊網，將是長流，脫入暫出，又復遭網。以是等輩，吾當憂念。汝既畢是往願，累劫重誓，廣度罪輩，吾復何慮？」\n\n說是語時，會中有一菩薩摩訶薩，名定自在王，白佛言：「世尊！地藏菩薩累劫已來，各發何願？今蒙世尊，殷勤讚歎。唯願世尊，略而說之。」\n\n爾時，世尊告定自在王菩薩：「諦聽！諦聽！善思念之，吾當為汝，分別解說。乃往過去，無量阿僧祇那由他不可說劫，爾時有佛，號一切智成就如來、應供、正遍知、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛、世尊，其佛壽命六萬劫。未出家時，為小國王，與一鄰國王為友，同行十善，饒益眾生。其鄰國內，所有人民，多造眾惡。二王議計，廣設方便。一王發願，早成佛道，當度是輩，令使無餘。一王發願，若不先度罪苦，令是安樂，得至菩提，我終未願成佛。」\n\n佛告定自在王菩薩：「一王發願早成佛者，即一切智成就如來是。一王發願永度罪苦眾生，未願成佛者，即地藏菩薩是。復於過去無量阿僧祇劫，有佛出世，名清淨蓮華目如來，其佛壽命四十劫。像法之中，有一羅漢，福度眾生。因次教化，遇一女人，字曰光目，設食供養。羅漢問之：『欲願何等？』光目答言：『我以母亡之日，資福救拔，未知我母生處何趣？』羅漢愍之，為入定觀，見光目女母墮在惡趣，受極大苦。羅漢問光目言：『汝母在生，作何行業？今在惡趣，受極大苦。』光目答言：『我母所習，唯好食噉魚鼈之屬。所食魚鼈多食其子，或炒或煮，恣情食噉。計其命數，千萬復倍。尊者慈愍，如何哀救？』羅漢愍之，為作方便，勸光目言：『汝可志誠念清淨蓮華目如來，兼塑畫形像，存亡獲報。』」\n\n「光目聞已，即捨所愛，尋畫佛像，而供養之。復恭敬心，悲泣瞻禮。忽於夜後，夢見佛身，金色晃耀，如須彌山，放大光明，而告光目：『汝母不久，當生汝家，纔覺飢寒，即當言說。』」\n\n「其後家內，婢生一子，未滿三日，而乃言說，稽首悲泣，告於光目：『生死業緣，果報自受。吾是汝母，久處暗冥，自別汝來，累墮大地獄。蒙汝福力，方得受生。為下賤人，又復短命，壽年十三，更落惡道。汝有何計，令吾脫免？』光目聞說，知母無疑，哽咽悲啼，而白婢子：『既是我母，合知本罪，作何行業，墮於惡道？』婢子答言：『以殺害毀罵二業受報。若非蒙福，救拔吾難，以是業故，未合解脫。』光目問言：『地獄罪報，其事云何？』婢子答言：『罪苦之事，不忍稱說，百千歲中，卒白難竟。』」\n\n「光目聞已，啼淚號泣，而白空界：『願我之母，永脫地獄。畢十三歲，更無重罪，及歷惡道。十方諸佛，慈哀愍我，聽我為母所發廣大誓願：若得我母永離三塗，及斯下賤，乃至女人之身，永劫不受者，願我自今日後，對清淨蓮華目如來像前，卻後百千萬億劫中，應有世界，所有地獄，及三惡道諸罪苦眾生，誓願救拔，令離地獄惡趣、畜生、餓鬼等。如是罪報等人，盡成佛竟，我然後方成正覺。』」\n\n「發誓願已，具聞清淨蓮華目如來而告之曰：『光目！汝大慈愍，善能為母發如是大願。吾觀汝母，十三歲畢，捨此報已，生為梵志，壽年百歲。過是報後，當生無憂國土，壽命不可計劫。後成佛果，廣度人天，數如恆河沙。』」\n\n佛告定自在王：「爾時羅漢福度光目者，即無盡意菩薩是。光目母者，即解脫菩薩是。光目女者，即地藏菩薩是。過去久遠劫中，如是慈愍發恆河沙願，廣度眾生。」\n\n「未來世中，若有男子女人，不行善者，行惡者，乃至不信因果者，邪淫妄語者，兩舌惡口者，毀謗大乘者，如是諸業眾生，必墮惡趣。若遇善知識，勸令一彈指間歸依地藏菩薩，是諸眾生，即得解脫三惡道報。若能志心歸敬，及瞻禮讚歎，香華衣服，種種珍寶，或復飲食，如是奉事者，未來百千萬億劫中，常在諸天受勝妙樂。若天福盡，下生人間，猶百千劫，常為帝王，能憶宿命因果本末。定自在王，如是地藏菩薩，有如此不可思議大威神力，廣利眾生，汝等諸菩薩，當記是經，廣宣流布。」\n\n定自在王白佛言：「世尊！願不有慮。我等千萬億菩薩摩訶薩，必能承佛威神，廣演是經於閻浮提，利益眾生。」定自在王菩薩白世尊已，合掌恭敬，作禮而退。\n\n爾時，四方天王，俱從座起，合掌恭敬，白佛言：「世尊！地藏菩薩於久遠劫來，發如是大願，云何至今，猶度未絕，更發廣大誓言？唯願世尊，為我等說。」\n\n佛告四天王：「善哉！善哉！吾今為汝，及未來現在天人眾等，廣利益故，說地藏菩薩於娑婆世界，閻浮提內，生死道中，慈哀救拔，度脫一切罪苦眾生方便之事。」四天王言：「唯然，世尊！願樂欲聞。」\n\n佛告四天王：「地藏菩薩久遠劫來，迄至於今，度脫眾生，猶未畢願。慈愍此世罪苦眾生，復觀未來無量劫中，因蔓不斷，以是之故，又發重願。如是菩薩，於娑婆世界，閻浮提中，百千萬億方便，而為教化。」\n\n「四天王！地藏菩薩若遇殺生者，說宿殃短命報。若遇竊盜者，說貧窮苦楚報。若遇邪淫者，說雀鴿鴛鴦報。若遇惡口者，說眷屬鬪諍報。若遇毀謗者，說無舌瘡口報。若遇瞋恚者，說醜陋癃殘報。若遇慳悋者，說所求違願報。若遇飲食無度者，說飢渴咽病報。若遇畋獵恣情者，說驚狂喪命報。若遇悖逆父母者，說天地災殺報。若遇燒山林木者，說狂迷取死報。若遇前後父母惡毒者，說返生鞭撻現受報。若遇網捕生雛者，說骨肉分離報。若遇毀謗三寶者，說盲聾瘖瘂報。若遇輕法慢教者，說永處惡道報。若遇破用常住者，說億劫輪迴地獄報。若遇污梵誣僧者，說永在畜生報。若遇湯火斬斫傷生者，說輪迴遞償報。若遇破戒犯齋者，說禽獸飢餓報。若遇非理毀用者，說所求闕絕報。若遇吾我貢高者，說卑使下賤報。若遇兩舌鬪亂者，說無舌百舌報。若遇邪見者，說邊地受生報。」\n\n「如是等閻浮提眾生，身口意業，惡習結果，百千報應，今粗略說。如是等閻浮提眾生，業感差別，地藏菩薩百千方便，而教化之。是諸眾生，先受如是等報，後墮地獄，動經劫數，無有出期。是故汝等，護人護國，無令是諸眾業，迷惑眾生。」\n\n四天王聞已，涕淚悲歎，合掌而退。"],
["卷中","地獄名號品第五","爾時，普賢菩薩摩訶薩白地藏菩薩言：「仁者！願為天龍四眾，及未來現在一切眾生，說娑婆世界及閻浮提罪苦眾生，所受報處、地獄名號及惡報等事，使未來世末法眾生，知是果報。」\n\n地藏答言：「仁者！我今承佛威神，及大士之力，略說地獄名號，及罪報惡報之事。仁者，閻浮提東方有山，號曰鐵圍，其山黑邃，無日月光。有大地獄，號極無間。又有地獄，名大阿鼻。復有地獄，名曰四角。復有地獄，名曰飛刀。復有地獄，名曰火箭。復有地獄，名曰夾山。復有地獄，名曰通槍。復有地獄，名曰鐵車。復有地獄，名曰鐵床。復有地獄，名曰鐵牛。復有地獄，名曰鐵衣。復有地獄，名曰千刃。復有地獄，名曰鐵驢。復有地獄，名曰烊銅。復有地獄，名曰抱柱。復有地獄，名曰流火。復有地獄，名曰耕舌。復有地獄，名為剉首。復有地獄，名曰燒腳。復有地獄，名曰啗眼。復有地獄，名曰鐵丸。復有地獄，名曰諍論。復有地獄，名曰鐵鈇。復有地獄，名曰多瞋。」\n\n地藏白言：「仁者！鐵圍之內，有如是等地獄，其數無限。更有叫喚地獄、拔舌地獄、糞尿地獄、銅鎖地獄、火象地獄、火狗地獄、火馬地獄、火牛地獄、火山地獄、火石地獄、火床地獄、火梁地獄、火鷹地獄、鋸牙地獄、剝皮地獄、飲血地獄、燒手地獄、燒腳地獄、倒刺地獄、火屋地獄、鐵屋地獄、火狼地獄。如是等地獄，其中各各復有諸小地獄，或一或二，或三或四，乃至百千，其中名號，各各不同。」\n\n地藏菩薩告普賢菩薩言：「仁者！此者皆是南閻浮提行惡眾生，業感如是。業力甚大，能敵須彌，能深巨海，能障聖道。是故眾生莫輕小惡，以為無罪，死後有報，纖毫受之。父子至親，岐路各別，縱然相逢，無肯代受。我今承佛威力，略說地獄罪報之事。唯願仁者，暫聽是言。」\n\n普賢答言：「吾已久知三惡道報，望仁者說，令後世末法一切惡行眾生，聞仁者說，使令歸佛。」\n\n地藏白言：「仁者！地獄罪報，其事如是：或有地獄，取罪人舌，使牛耕之。或有地獄，取罪人心，夜叉食之。或有地獄，鑊湯盛沸，煮罪人身。或有地獄，赤燒銅柱，使罪人抱。或有地獄，使諸火燒，趁及罪人。或有地獄，一向寒氷。或有地獄，無限糞尿。或有地獄，純飛鈒鑗。或有地獄，多攢火槍。或有地獄，唯撞胸背。或有地獄，但燒手足。或有地獄，盤絞鐵蛇。或有地獄，驅逐鐵狗。或有地獄，盡駕鐵騾。仁者，如是等報，各各獄中，有百千種業道之器，無非是銅，是鐵，是石，是火。此四種物，眾業行感。若廣說地獄罪報等事，一一獄中，更有百千種苦楚，何況多獄。我今承佛威神，及仁者問，略說如是。若廣解說，窮劫不盡。」"],
["卷中","如來讚歎品第六","爾時，世尊舉身放大光明，遍照百千萬億恆河沙等諸佛世界，出大音聲，普告諸佛世界一切諸菩薩摩訶薩，及天龍鬼神、人、非人等：「聽吾今日稱揚讚歎地藏菩薩摩訶薩，於十方世界，現大不可思議威神慈悲之力，救護一切罪苦之事。吾滅度後，汝等諸菩薩大士，及天龍鬼神等，廣作方便，衛護是經，令一切眾生，證涅槃樂。」\n\n說是語已，會中有一菩薩，名曰普廣，合掌恭敬，而白佛言：「今見世尊讚歎地藏菩薩，有如是不可思議大威神德。唯願世尊為未來世末法眾生，宣說地藏菩薩利益人天因果等事，使諸天龍八部，及未來世眾生，頂受佛語。」\n\n爾時，世尊告普廣菩薩及四眾等：「諦聽！諦聽！吾當為汝略說地藏菩薩利益人天福德之事。」普廣白言：「唯然，世尊！願樂欲聞。」\n\n佛告普廣菩薩：「未來世中，若有善男子、善女人，聞是地藏菩薩摩訶薩名者，或合掌者、讚歎者、作禮者、戀慕者，是人超越三十劫罪。」\n\n「普廣！若有善男子、善女人，或彩畫形像，或土石膠漆、金、銀、銅、鐵，作此菩薩，一瞻一禮者，是人百返生於三十三天，永不墮於惡道。假如天福盡故，下生人間，猶為國王，不失大利。若有女人，厭女人身，盡心供養地藏菩薩畫像，及土石膠漆銅鐵等像，如是日日不退，常以華、香、飲食、衣服、繒綵、幢旛、錢、寶物等供養。是善女人，盡此一報女身，百千萬劫，更不生有女人世界，何況復受。除非慈願力故，要受女身，度脫眾生。承斯供養地藏力故，及功德力，百千萬劫，不受女身。」\n\n「復次，普廣！若有女人，厭是醜陋、多疾病者，但於地藏像前，志心瞻禮，食頃之間，是人千萬劫中，所受生身，相貌圓滿。是醜陋女人，如不厭女身，即百千萬億生中，常為王女，乃及王妃、宰輔大姓、大長者女，端正受生，諸相圓滿。由志心故，瞻禮地藏菩薩，獲福如是。」\n\n「復次，普廣！若有善男子、善女人，能對菩薩像前，作諸伎樂，及歌詠讚歎，香華供養，乃至勸於一人多人，如是等輩，現在世中，及未來世，常得百千鬼神日夜衛護，不令惡事輒聞其耳，何況親受諸橫？」\n\n「復次，普廣！未來世中，若有惡人，及惡神惡鬼，見有善男子善女人，歸敬供養讚歎瞻禮地藏菩薩形像，或妄生譏毀，謗無功德及利益事，或露齒笑，或背面非，或勸人共非，或一人非，或多人非，乃至一念生譏毀者，如是之人，賢劫千佛滅度，譏毀之報，尚在阿鼻地獄，受極重罪。過是劫已，方受餓鬼。又經千劫，復受畜生。又經千劫，方得人身。縱受人身，貧窮下賤，諸根不具，多被惡業，來結其心，不久之間，復墮惡道。是故，普廣！譏毀他人供養，尚獲此報，何況別生惡見毀滅？」\n\n「復次，普廣！若未來世，有男子女人，久處床枕，求生求死，了不可得，或夜夢惡鬼，乃及家親，或遊險道，或多魘寐，共鬼神遊，日月歲深，轉復尫瘵，眠中叫苦，慘悽不樂者，此皆是業道論對，未定輕重，或難捨壽，或不得愈。男女俗眼，不辨是事。但當對諸佛菩薩像前，高聲轉讀此經一遍。或取病人可愛之物，或衣服寶貝、莊園舍宅，對病人前，高聲唱言：『我某甲等，為是病人，對經像前，捨諸等物，或供養經像，或造佛菩薩形像，或造塔寺，或然油燈，或施常住。』如是三白病人，遣令聞知。假令諸識分散，至氣盡者，乃至一日、二日、三日、四日，至七日已來，但高聲白，高聲讀經。是人命終之後，宿殃重罪，至於五無間罪，永得解脫。所受生處，常知宿命。何況善男子、善女人，自書此經，或教人書，或自塑畫菩薩形像，乃至教人塑畫，所受果報，必獲大利。」\n\n「是故，普廣！若見有人讀誦是經，乃至一念讚歎是經，或恭敬者，汝須百千方便，勸是等人，勤心莫退，能得未來現在千萬億不可思議功德。」\n\n「復次，普廣！若未來世諸眾生等，或夢或寐，見諸鬼神乃及諸形，或悲或啼，或愁或歎，或恐或怖。此皆是一生十生，百生千生，過去父母、男女弟妹、夫妻眷屬，在於惡趣，未得出離，無處希望福力救拔，當告宿世骨肉，使作方便，願離惡道。普廣！汝以神力，遣是眷屬，令對諸佛菩薩像前，志心自讀此經，或請人讀，其數三遍或七遍。如是惡道眷屬，經聲畢是遍數，當得解脫。乃至夢寐之中，永不復見。」\n\n「復次，普廣！若未來世有諸下賤等人，或奴或婢，乃至諸不自由之人，覺知宿業，要懺悔者，志心瞻禮地藏菩薩形像，乃至一七日中，念菩薩名，可滿萬遍。如是等人，盡此報後，千萬生中，常生尊貴，更不經三惡道苦。」\n\n「復次，普廣！若未來世中，閻浮提內，剎利、婆羅門、長者、居士、一切人等，及異姓種族，有新產者，或男或女，七日之中，早與讀誦此不思議經典，更為念菩薩名，可滿萬遍。是新生子，或男或女，宿有殃報，便得解脫，安樂易養，壽命增長。若是承福生者，轉增安樂，及與壽命。」\n\n「復次，普廣！若未來世眾生，於月一日、八日、十四日、十五日、十八日、二十三、二十四、二十八、二十九日，乃至三十日，是諸日等，諸罪結集，定其輕重。南閻浮提眾生，舉止動念，無不是業，無不是罪，何況恣情殺害、竊盜、邪淫、妄語，百千罪狀。能於是十齋日，對佛菩薩諸賢聖像前，讀是經一遍，東西南北，百由旬內，無諸災難。當此居家，若長若幼，現在未來百千歲中，永離惡趣。能於十齋日每轉一遍，現世令此居家無諸橫病，衣食豐溢。」\n\n「是故，普廣！當知地藏菩薩有如是等不可說百千萬億大威神力利益之事。閻浮眾生，於此大士有大因緣。是諸眾生，聞菩薩名，見菩薩像，乃至聞是經，三字五字，或一偈一句者，現在殊妙安樂，未來之世，百千萬生，常得端正，生尊貴家。」\n\n爾時，普廣菩薩聞佛如來稱揚讚歎地藏菩薩已，胡跪合掌，復白佛言：「世尊！我久知是大士有如此不可思議神力，及大誓願力。為未來眾生，遣知利益，故問如來，唯然頂受。世尊！當何名此經？使我云何流布？」\n\n佛告普廣：「此經有三名：一名地藏本願，亦名地藏本行，亦名地藏本誓力經。緣此菩薩，久遠劫來，發大重願，利益眾生，是故汝等，依願流布。」普廣聞已，合掌恭敬，作禮而退。"],
["卷中","利益存亡品第七","爾時，地藏菩薩摩訶薩白佛言：「世尊！我觀是閻浮眾生，舉心動念，無非是罪。脫獲善利，多退初心；若遇惡緣，念念增益。是等輩人，如履泥塗，負於重石，漸困漸重，足步深邃。若得遇知識，替與減負，或全與負，是知識有大力故，復相扶助，勸令牢腳，若達平地，須省惡路，無再經歷。」\n\n「世尊！習惡眾生，從纖毫間，便至無量。是諸眾生，有如此習，臨命終時，父母眷屬宜為設福，以資前路。或懸旛蓋，及然油燈，或轉讀尊經，或供養佛像及諸聖像。乃至念佛菩薩及辟支佛名字，一名一號，歷臨終人耳根，或聞在本識。是諸眾生所造惡業，計其感果，必墮惡趣，緣是眷屬為臨終人修此聖因，如是眾罪，悉皆銷滅。若能更為身死之後，七七日內，廣造眾善，能使是諸眾生，永離惡趣，得生人天，受勝妙樂，現在眷屬，利益無量。」\n\n「是故我今對佛世尊，及天龍八部、人、非人等，勸於閻浮提眾生：臨終之日，慎勿殺害，及造惡緣——拜祭鬼神，求諸魍魎。何以故？爾所殺害，乃至拜祭，無纖毫之力利益亡人，但結罪緣，轉增深重。假使來世，或現在生，得獲聖分，生人天中，緣是臨終被諸眷屬造是惡因，亦令是命終人，殃累對辯，晚生善處。何況臨命終人，在生未曾有少善根，各據本業，自受惡趣，何忍眷屬，更為增業？譬如有人，從遠地來，絕糧三日，所負擔物，強過百斤。忽遇鄰人，更附少物，以是之故，轉復困重。世尊！我觀閻浮眾生，但能於諸佛教中，乃至善事，一毛一渧，一沙一塵，如是利益，悉皆自得。」\n\n說是語時，會中有一長者，名曰大辯，是長者久證無生，化度十方，現長者身，合掌恭敬，問地藏菩薩言：「大士！是南閻浮提眾生，命終之後，小大眷屬，為修功德，乃至設齋，造眾善因，是命終人，得大利益及解脫不？」\n\n地藏答言：「長者！我今為未來現在一切眾生，承佛威力，略說是事。長者，未來現在諸眾生等，臨命終日，得聞一佛名、一菩薩名、一辟支佛名，不問有罪無罪，悉得解脫。」\n\n「若有男子女人，在生不修善因，多造眾罪，命終之後，眷屬小大為造福利一切聖事，七分之中，而乃獲一，六分功德，生者自利。以是之故，未來現在善男女等，聞健自修，分分己獲。無常大鬼，不期而到，冥冥遊神，未知罪福，七七日內，如癡如聾。或在諸司，辯論業果，審定之後，據業受生。未測之間，千萬愁苦，何況墮於諸惡趣等？是命終人，未得受生，在七七日內，念念之間，望諸骨肉眷屬，與造福力救拔。過是日後，隨業受報，若是罪人，動經千百歲中，無解脫日。若是五無間罪，墮大地獄，千劫萬劫，永受眾苦。」\n\n「復次，長者！如是罪業眾生，命終之後，眷屬骨肉，為修營齋，資助業道。未齋食竟，及營齋之次，米泔菜葉，不棄於地。乃至諸食未獻佛僧，勿得先食。如有違食及不精勤，是命終人，了不得力。如精勤護淨，奉獻佛僧，是命終人，七分獲一。是故，長者！閻浮眾生，若能為其父母，乃至眷屬，命終之後，設齋供養，志心勤懇，如是之人，存亡獲利。」\n\n說是語時，忉利天宮有千萬億那由他閻浮鬼神，悉發無量菩提之心。大辯長者，作禮而退。"],
["卷中","閻羅王眾讚歎品第八","爾時，鐵圍山內，有無量鬼王，與閻羅天子，俱詣忉利，來到佛所。所謂惡毒鬼王、多惡鬼王、大諍鬼王、白虎鬼王、血虎鬼王、赤虎鬼王、散殃鬼王、飛身鬼王、電光鬼王、狼牙鬼王、千眼鬼王、噉獸鬼王、負石鬼王、主耗鬼王、主禍鬼王、主食鬼王、主財鬼王、主畜鬼王、主禽鬼王、主獸鬼王、主魅鬼王、主產鬼王、主命鬼王、主疾鬼王、主險鬼王、三目鬼王、四目鬼王、五目鬼王、祁利失王、大祁利失王、祁利叉王、大祁利叉王、阿那吒王、大阿那吒王。如是等大鬼王，各各與百千諸小鬼王，盡居閻浮提，各有所執，各有所主。是諸鬼王，與閻羅天子，承佛威神，及地藏菩薩摩訶薩力，俱詣忉利，在一面立。\n\n爾時，閻羅天子，胡跪合掌，白佛言：「世尊！我等今者與諸鬼王，承佛威神，及地藏菩薩摩訶薩力，方得詣此忉利大會，亦是我等獲善利故。我今有小疑事，敢問世尊，唯願世尊，慈悲宣說。」佛告閻羅天子：「恣汝所問，吾為汝說。」\n\n是時，閻羅天子瞻禮世尊，及迴視地藏菩薩，而白佛言：「世尊！我觀地藏菩薩，在六道中，百千方便，而度罪苦眾生，不辭疲倦。是大菩薩，有如是不可思議神通之事。然諸眾生，脫獲罪報，未久之間，又墮惡道。世尊！是地藏菩薩既有如是不可思議神力，云何眾生而不依止善道，永取解脫？唯願世尊，為我解說。」\n\n佛告閻羅天子：「南閻浮提眾生，其性剛強，難調難伏。是大菩薩，於百千劫，頭頭救拔如是眾生，早令解脫。是罪報人，乃至墮大惡趣。菩薩以方便力，拔出根本業緣，而遣悟宿世之事。自是閻浮眾生，結惡習重，旋出旋入。勞斯菩薩，久經劫數，而作度脫。」\n\n「譬如有人，迷失本家，誤入險道。其險道中，多諸夜叉，及虎狼師子、蚖蛇蝮蠍。如是迷人，在險道中，須臾之間，即遭諸毒。有一知識，多解大術，善禁是毒，乃及夜叉諸惡毒等。忽逢迷人，欲進險道，而語之言：『咄哉！男子！為何事故，而入此路？有何異術，能制諸毒？』是迷路人，忽聞是語，方知險道，即便退步，求出此路。是善知識，提攜接手，引出險道，免諸惡毒，至於好道，令得安樂，而語之言：『咄哉！迷人！自今已後，勿履是道。此路入者，卒難得出，復損性命。』是迷路人，亦生感重。臨別之時，知識又言：『若見親知及諸路人，若男若女，言於此路多諸毒惡，喪失性命。無令是眾，自取其死。』」\n\n「是故地藏菩薩具大慈悲，救拔罪苦眾生，生天人中，令受妙樂。是諸罪眾，知業道苦，脫得出離，永不再歷。如迷路人，誤入險道，遇善知識，引接令出，永不復入。逢見他人，復勸莫入，自言：『因是迷故，得解脫竟，更不復入。』若再履踐，猶尚迷誤，不覺舊曾所落險道，或致失命，如墮惡趣。地藏菩薩方便力故，使令解脫，生人天中。旋又再入，若業結重，永處地獄，無解脫時。」\n\n爾時，惡毒鬼王合掌恭敬，白佛言：「世尊！我等諸鬼王，其數無量，在閻浮提，或利益人，或損害人，各各不同。然是業報，使我眷屬，遊行世界，多惡少善。過人家庭，或城邑聚落，莊園房舍。或有男子女人，修毛髮善事，乃至懸一旛一蓋，少香少華，供養佛像及菩薩像，或轉讀尊經，燒香供養一句一偈。我等鬼王，敬禮是人，如過去、現在、未來諸佛。勅諸小鬼，各有大力，及土地分，便令衛護。不令惡事橫事、惡病橫病，乃至不如意事，近於此舍等處，何況入門？」\n\n佛讚鬼王：「善哉！善哉！汝等及與閻羅，能如是擁護善男女等，吾亦告梵王帝釋，令衛護汝。」\n\n說是語時，會中有一鬼王，名曰主命，白佛言：「世尊！我本業緣，主閻浮人命，生時死時，我皆主之。在我本願，甚欲利益。自是眾生，不會我意，致令生死，俱不得安。」\n\n「何以故？是閻浮提人，初生之時，不問男女，或欲生時，但作善事，增益舍宅，自令土地無量歡喜，擁護子母，得大安樂，利益眷屬。或已生下，慎勿殺害，取諸鮮味，供給產母。及廣聚眷屬，飲酒食肉，歌樂絃管，能令子母，不得安樂。」\n\n「何以故？是產難時，有無數惡鬼，及魍魎精魅，欲食腥血。是我早令舍宅土地靈祁，荷護子母，使令安樂，而得利益。如是之人，見安樂故，便合設福，答諸土地。翻為殺害，集聚眷屬，以是之故，犯殃自受，子母俱損。」\n\n「又閻浮提臨命終人，不問善惡，我欲令是命終之人，不落惡道，何況自修善根，增我力故。是閻浮提行善之人，臨命終時，亦有百千惡道鬼神，或變作父母，乃至諸眷屬，引接亡人，令落惡道，何況本造惡者？」\n\n「世尊！如是閻浮提男子女人，臨命終時，神識惛昧，不辯善惡，乃至眼耳，更無見聞。是諸眷屬，當須設大供養，轉讀尊經，念佛菩薩名號。如是善緣，能令亡者，離諸惡道，諸魔鬼神，悉皆退散。世尊！一切眾生臨命終時，若得聞一佛名、一菩薩名，或大乘經典一句一偈，我觀如是輩人，除五無間殺害之罪，小小惡業，合墮惡趣者，尋即解脫。」\n\n佛告主命鬼王：「汝大慈故，能發如是大願，於生死中，護諸眾生。若未來世中，有男子女人，至生死時，汝莫退是願，總令解脫，永得安樂。」\n\n鬼王白佛言：「願不有慮，我畢是形，念念擁護閻浮眾生，生時死時，俱得安樂。但願諸眾生，於生死時，信受我語，無不解脫，獲大利益。」\n\n爾時，佛告地藏菩薩：「是大鬼王主命者，已曾經百千生，作大鬼王，於生死中，擁護眾生。是大士慈悲願故，現大鬼身，實非鬼也。卻後過一百七十劫，當得成佛，號曰無相如來，劫名安樂，世界名淨住，其佛壽命，不可計劫。地藏！是大鬼王，其事如是，不可思議，所度人天，亦不可限量。」"],
["卷中","稱佛名號品第九","爾時，地藏菩薩摩訶薩白佛言：「世尊！我今為未來眾生，演利益事，於生死中，得大利益。唯願世尊，聽我說之。」\n\n佛告地藏菩薩：「汝今欲興慈悲，救拔一切罪苦六道眾生，演不思議事，今正是時，唯當速說。吾即涅槃，使汝早畢是願，吾亦無憂現在未來一切眾生。」\n\n地藏菩薩白佛言：「世尊！過去無量阿僧祇劫，有佛出世，號無邊身如來。若有男子女人，聞是佛名，暫生恭敬，即得超越四十劫生死重罪。何況塑畫形像、供養讚歎？其人獲福，無量無邊。\n\n「又於過去恆河沙劫，有佛出世，號寶性如來。若有男子女人，聞是佛名，一彈指頃，發心歸依，是人於無上道，永不退轉。」\n\n「又於過去，有佛出世，號波頭摩勝如來。若有男子女人，聞是佛名，歷於耳根，是人當得千返生於六欲天中，何況志心稱念。」\n\n「又於過去不可說不可說阿僧祇劫，有佛出世，號獅子吼如來。若有男子女人，聞是佛名，一念歸依，是人得遇無量諸佛，摩頂授記。」\n\n「又於過去，有佛出世，號拘留孫佛。若有男子女人，聞是佛名，志心瞻禮，或復讚歎，是人於賢劫千佛會中，為大梵王，得授上記。」\n\n「又於過去，有佛出世，號毘婆尸佛。若有男子女人，聞是佛名，永不墮惡道，常生人天，受勝妙樂。」\n\n「又於過去無量無數恆河沙劫，有佛出世，號寶勝如來。若有男子女人，聞是佛名，畢竟不墮惡道，常在天上，受勝妙樂。」\n\n「又於過去，有佛出世，號寶相如來。若有男子女人，聞是佛名，生恭敬心，是人不久，得阿羅漢果。」\n\n「又於過去，無量阿僧祇劫，有佛出世，號袈裟幢如來。若有男子女人，聞是佛名者，超一百大劫生死之罪。」\n\n「又於過去，有佛出世，號大通山王如來。若有男子女人，聞是佛名者，是人得遇恆河沙佛，廣為說法，必成菩提。」\n\n「又於過去，有淨月佛、山王佛、智勝佛、淨名王佛、智成就佛、無上佛、妙聲佛、滿月佛、月面佛，有如是等不可說佛。世尊！現在未來一切眾生，若天若人，若男若女，但念得一佛名號，功德無量，何況多名？是眾生等，生時死時，自得大利，終不墮惡道。若有臨命終人，家中眷屬，乃至一人，為是病人，高聲念一佛名，是命終人，除五無間罪，餘業報等，悉得銷滅。是五無間罪，雖至極重，動經億劫，了不得出，承斯臨命終時，他人為其稱念佛名，於是罪中亦漸銷滅。何況眾生，自稱自念，獲福無量，滅無量罪。」"],
["卷下","校量布施功德緣品第十","爾時，地藏菩薩摩訶薩承佛威神，從座而起，胡跪合掌，白佛言：「世尊！我觀業道眾生，校量布施，有輕有重：有一生受福，有十生受福，有百生千生受大福利者。是事云何？唯願世尊，為我說之。」\n\n爾時，佛告地藏菩薩：「吾今於忉利天宮，一切眾會，說閻浮提布施校量功德輕重。汝當諦聽，吾為汝說。」地藏白佛言：「我疑是事，願樂欲聞。」\n\n佛告地藏菩薩：「南閻浮提，有諸國王、宰輔大臣、大長者、大剎利、大婆羅門等，若遇最下貧窮，乃至癃殘瘖瘂，聾癡無目，如是種種不完具者。是大國王等，欲布施時，若能具大慈悲，下心含笑，親手遍布施，或使人施，軟言慰諭。是國王等，所獲福利，如布施百恆河沙佛功德之利。何以故？緣是國王等，於是最貧賤輩，及不完具者，發大慈心，是故福利，有如此報：百千生中，常得七寶具足，何況衣食受用。」\n\n「復次，地藏！若未來世，有諸國王，至婆羅門等，遇佛塔寺，或佛形像，乃至菩薩、聲聞、辟支佛像，躬自營辦，供養布施。是國王等，當得三劫為帝釋身，受勝妙樂。若能以此布施福利，迴向法界，是大國王等，於十劫中，常為大梵天王。」\n\n「復次，地藏！若未來世，有諸國王，至婆羅門等，遇先佛塔廟，或至經像，毀壞破落，乃能發心修補。是國王等，或自營辦，或勸他人，乃至百千人等，布施結緣。是國王等，百千生中，常為轉輪王身。如是他人同布施者，百千生中，常為小國王身。更能於塔廟前，發迴向心，如是國王，乃及諸人，盡成佛道，以此果報，無量無邊。」\n\n「復次，地藏！未來世中，有諸國王，及婆羅門等，見諸老病，及生產婦女，若一念間，具大慈心，布施醫藥、飲食、臥具，使令安樂。如是福利，最不思議：一百劫中，常為淨居天主；二百劫中，常為六欲天主；畢竟成佛，永不墮惡道，乃至百千生中，耳不聞苦聲。」\n\n「復次，地藏！若未來世中，有諸國王，及婆羅門等，能作如是布施，獲福無量，更能迴向，不問多少，畢竟成佛，何況釋梵轉輪之報。是故，地藏！普勸眾生，當如是學。」\n\n「復次，地藏！未來世中，若善男子、善女人，於佛法中，種少善根，毛髮沙塵等許，所受福利，不可為諭。復次，地藏！未來世中，若有善男子、善女人，遇佛形像、菩薩形像、辟支佛形像、轉輪王形像，布施供養，得無量福，常在人天，受勝妙樂。若能迴向法界，是人福利，不可為諭。」\n\n「復次，地藏！未來世中，若有善男子、善女人，遇大乘經典，或聽聞一偈一句，發殷重心，讚歎恭敬，布施供養。是人獲大果報，無量無邊。若能迴向法界，其福不可為諭。」\n\n「復次，地藏！若未來世中，有善男子、善女人，遇佛塔寺、大乘經典，新者布施供養，瞻禮讚歎，恭敬合掌；若遇故者或毀壞者，修補營理，或獨發心，或勸多人同共發心。如是等輩，三十生中，常為諸小國王。檀越之人，常為輪王，還以善法，教化諸小國王。」\n\n「復次，地藏！未來世中，若有善男子、善女人，於佛法中，所種善根，或布施供養，或修補塔寺，或裝理經典，乃至一毛一塵，一沙一渧。如是善事，但能迴向法界，是人功德，百千生中，受上妙樂。如但迴向自家眷屬，或自身利益，如是之果，即三生受樂，捨一得萬報。是故，地藏！布施因緣，其事如是。」"],
["卷下","地神護法品第十一","爾時，堅牢地神白佛言：「世尊！我從昔來，瞻視頂禮無量菩薩摩訶薩，皆是大不可思議神通智慧，廣度眾生。是地藏菩薩摩訶薩，於諸菩薩，誓願深重。世尊！是地藏菩薩，於閻浮提，有大因緣。如文殊、普賢、觀音、彌勒，亦化百千身形，度於六道，其願尚有畢竟。是地藏菩薩，教化六道一切眾生，所發誓願劫數，如千百億恆河沙。」\n\n「世尊！我觀未來及現在眾生，於所住處，於南方清潔之地，以土石竹木，作其龕室。是中能塑畫，乃至金銀銅鐵，作地藏形像，燒香供養，瞻禮讚歎。是人居處，即得十種利益。何等為十？一者，土地豐壤。二者，家宅永安。三者，先亡生天。四者，現存益壽。五者，所求遂意。六者，無水火災。七者，虛耗辟除。八者，杜絕惡夢。九者，出入神護。十者，多遇聖因。」\n\n「世尊！未來世中，及現在眾生，若能於所住處方面，作如是供養，得如是利益。」復白佛言：「世尊！未來世中，若有善男子、善女人，於所住處，有此經典及菩薩像，是人更能轉讀經典，供養菩薩。我常日夜，以本神力，衛護是人，乃至水火盜賊，大橫小橫，一切惡事，悉皆消滅。」\n\n佛告堅牢地神：「汝大神力，諸神少及。何以故？閻浮土地，悉蒙汝護。乃至草木沙石，稻麻竹葦，穀米寶貝，從地而有，皆因汝力。又常稱揚地藏菩薩利益之事，汝之功德，及以神通，百千倍於常分地神。若未來世中，有善男子、善女人，供養菩薩，及轉讀是經，但依地藏本願經一事修行者，汝以本神力，而擁護之。勿令一切災害，及不如意事，輒聞於耳，何況令受？非但汝獨護是人故，亦有釋梵眷屬、諸天眷屬，擁護是人。何故得如是聖賢擁護？皆由瞻禮地藏形像，及轉讀是本願經故。自然畢竟出離苦海，證涅槃樂。以是之故，得大擁護。」"],
["卷下","見聞利益品第十二","爾時，世尊從頂門上，放百千萬億大毫相光——所謂白毫相光、大白毫相光、瑞毫相光、大瑞毫相光、玉毫相光、大玉毫相光、紫毫相光、大紫毫相光、青毫相光、大青毫相光、碧毫相光、大碧毫相光、紅毫相光、大紅毫相光、綠毫相光、大綠毫相光、金毫相光、大金毫相光、慶雲毫相光、大慶雲毫相光、千輪毫光、大千輪毫光、寶輪毫光、大寶輪毫光、日輪毫光、大日輪毫光、月輪毫光、大月輪毫光、宮殿毫光、大宮殿毫光、海雲毫光、大海雲毫光。於頂門上，放如是等毫相光已，出微妙音，告諸大眾、天龍八部、人、非人等：「聽吾今日於忉利天宮，稱揚讚歎地藏菩薩於人天中利益等事、不思議事、超聖因事、證十地事、畢竟不退阿耨多羅三藐三菩提事。」\n\n說是語時，會中有一菩薩摩訶薩，名觀世音，從座而起，胡跪合掌，白佛言：「世尊！是地藏菩薩摩訶薩，具大慈悲，憐愍罪苦眾生，於千萬億世界，化千萬億身。所有功德，及不思議威神之力，我聞世尊與十方無量諸佛，異口同音，讚歎地藏菩薩云：正使過去現在未來諸佛，說其功德，猶不能盡。向者，又蒙世尊普告大眾，欲稱揚地藏利益等事。唯願世尊，為現在未來一切眾生，稱揚地藏不思議事，令天龍八部，瞻禮獲福。」\n\n佛告觀世音菩薩：「汝於娑婆世界，有大因緣。若天若龍、若男若女、若神若鬼，乃至六道罪苦眾生，聞汝名者、見汝形者、戀慕汝者、讚歎汝者，是諸眾生，於無上道，必不退轉，常生人天，具受妙樂，因果將熟，遇佛授記。汝今具大慈悲，憐愍眾生，及天龍八部，聽吾宣說地藏菩薩不思議利益之事。汝當諦聽，吾今說之。」觀世音言：「唯然，世尊！願樂欲聞。」\n\n佛告觀世音菩薩：「未來現在諸世界中，有天人受天福盡，有五衰相現，或有墮於惡道之者。如是天人，若男若女，當現相時，或見地藏菩薩形像，或聞地藏菩薩名，一瞻一禮，是諸天人，轉增天福，受大快樂，永不墮三惡道報。何況見聞菩薩，以諸香、華、衣服、飲食、寶貝、瓔珞，布施供養，所獲功德福利，無量無邊。」\n\n「復次，觀世音！若未來現在諸世界中，六道眾生，臨命終時，得聞地藏菩薩名，一聲歷耳根者，是諸眾生，永不歷三惡道苦。何況臨命終時，父母眷屬，將是命終人舍宅、財物、寶貝、衣服，塑畫地藏形像。或使病人未終之時，眼耳見聞，知道眷屬將舍宅寶貝等，為其自身，塑畫地藏菩薩形像。是人若是業報合受重病者，承斯功德，尋即除愈，壽命增益。是人若是業報命盡，應有一切罪障業障，合墮惡趣者，承斯功德，命終之後，即生人天，受勝妙樂，一切罪障，悉皆銷滅。」\n\n「復次，觀世音菩薩！若未來世，有男子女人，或乳哺時，或三歲、五歲、十歲已下，亡失父母，乃及亡失兄弟姊妹。是人年既長大，思憶父母，及諸眷屬，不知落在何趣？生何世界？生何天中？是人若能塑畫地藏菩薩形像，乃至聞名，一瞻一禮，一日至七日，莫退初心，聞名見形，瞻禮供養。是人眷屬，假因業故，墮惡趣者，計當劫數，承斯男女兄弟姊妹塑畫地藏形像、瞻禮功德，尋即解脫，生人天中，受勝妙樂；是人眷屬，如有福力，已生人天，受勝妙樂者，即承斯功德，轉增聖因，受無量樂。是人更能三七日中，一心瞻禮地藏形像，念其名字，滿於萬遍。當得菩薩現無邊身，具告是人眷屬生界；或於夢中，菩薩現大神力，親領是人於諸世界，見諸眷屬。更能每日，念菩薩名千遍，至於千日。是人當得菩薩遣所在土地鬼神，終身衛護，現世衣食豐溢，無諸疾苦，乃至橫事不入其門，何況及身？是人畢竟得菩薩摩頂授記。」\n\n「復次，觀世音菩薩！若未來世，有善男子、善女人，欲發廣大慈心，救度一切眾生者，欲修無上菩提者，欲出離三界者。是諸人等，見地藏形像及聞名者，至心皈依，或以香華衣服、寶貝飲食，供養瞻禮。是善男女等，所願速成，永無障礙。」\n\n「復次，觀世音！若未來世，有善男子、善女人，欲求現在未來百千萬億等願、百千萬億等事，但當皈依、瞻禮、供養、讚歎地藏菩薩形像，如是所願所求，悉皆成就。復願地藏菩薩，具大慈悲，永擁護我，是人於睡夢中，即得菩薩摩頂授記。」\n\n「復次，觀世音菩薩！若未來世，善男子、善女人，於大乘經典，深生珍重，發不思議心，欲讀欲誦。縱遇明師，教視令熟，旋得旋忘，動經年月，不能讀誦。是善男子等，有宿業障，未得消除，故於大乘經典，無讀誦性。如是之人，聞地藏菩薩名，見地藏菩薩像，具以本心恭敬陳白，更以香、華、衣服、飲食、一切玩具，供養菩薩。以淨水一盞，經一日一夜，安菩薩前，然後合掌請服，迴首向南，臨入口時，至心鄭重。服水既畢，慎五辛、酒肉、邪婬、妄語，及諸殺害，一七日，或三七日。是善男子、善女人，於睡夢中，具見地藏菩薩現無邊身，於是人處授灌頂水。其人夢覺，即獲聰明，應是經典，一歷耳根，即當永記，更不忘失一句一偈。」\n\n「復次，觀世音菩薩！若未來世，有諸人等：衣食不足，求者乖願；或多病疾，或多凶衰；家宅不安，眷屬分散；或諸橫事，多來忤身；睡夢之間，多有驚怖。如是人等，聞地藏名，見地藏形，至心恭敬，念滿萬遍。是諸不如意事，漸漸消滅，即得安樂，衣食豐溢，乃至於睡夢中，悉皆安樂。」\n\n「復次，觀世音菩薩！若未來世，有善男子、善女人，或因治生，或因公私，或因生死，或因急事，入山林中，過渡河海，乃及大水，或經險道。是人先當念地藏菩薩名萬遍，所過土地，鬼神衛護，行住坐臥，永保安樂。乃至逢於虎狼師子、一切毒害，不能損之。」\n\n佛告觀世音菩薩：「是地藏菩薩，於閻浮提，有大因緣。若說於諸眾生見聞利益等事，百千劫中，說不能盡。是故，觀世音！汝以神力，流布是經，令娑婆世界眾生，百千萬劫，永受安樂。」"],
["卷下","囑累人天品第十三","爾時，世尊舉金色臂，又摩地藏菩薩摩訶薩頂，而作是言：「地藏！地藏！汝之神力，不可思議；汝之慈悲，不可思議；汝之智慧，不可思議；汝之辯才，不可思議。正使十方諸佛，讚歎宣說汝之不思議事，千萬劫中，不能得盡。地藏！地藏！記吾今日在忉利天中，於百千萬億不可說不可說一切諸佛菩薩、天龍八部、大會之中，再以人天諸眾生等，未出三界，在火宅中者，付囑於汝。無令是諸眾生，墮惡趣中一日一夜，何況更落五無間及阿鼻地獄，動經千萬億劫，無有出期。」\n\n「地藏！是南閻浮提眾生，志性無定，習惡者多，縱發善心，須臾即退，若遇惡緣，念念增長。以是之故，吾分是形，百千億化度，隨其根性而度脫之。地藏！吾今慇懃，以天人眾，付囑於汝。未來之世，若有天人，及善男子、善女人，於佛法中，種少善根，一毛一塵，一沙一渧。汝以道力，擁護是人，漸修無上，勿令退失。復次，地藏！未來世中，若天若人，隨業報應，落在惡趣。臨墮趣中，或至門首，是諸眾生，若能念得一佛名、一菩薩名、一句一偈大乘經典。是諸眾生，汝以神力，方便救拔。於是人所，現無邊身，為碎地獄，遣令生天，受勝妙樂。」\n\n爾時，地藏菩薩摩訶薩胡跪合掌，白佛言：「世尊！唯願世尊，不以為慮。未來世中，若有善男子、善女人，於佛法中，一念恭敬，我亦百千方便，度脫是人，於生死中，速得解脫。何況聞諸善事，念念修行？自然於無上道，永不退轉。」\n\n說是語時，會中有一菩薩，名虛空藏，白佛言：「世尊！我自至忉利，聞於如來讚歎地藏菩薩，威神勢力，不可思議。未來世中，若有善男子、善女人，乃及一切天龍，聞此經典，及地藏名字，或瞻禮形像，得幾種福利？唯願世尊，為未來現在一切眾等，略而說之。」\n\n佛告虛空藏菩薩：「諦聽！諦聽！吾當為汝分別說之。若未來世，有善男子、善女人，見地藏形像，及聞此經，乃至讀誦，香華飲食、衣服珍寶，布施供養，讚歎瞻禮，得二十八種利益：一者天龍護念，二者善果日增，三者集聖上因，四者菩提不退，五者衣食豐足，六者疾疫不臨，七者離水火災，八者無盜賊厄，九者人見欽敬，十者神鬼助持，十一者女轉男身，十二者為王臣女，十三者端正相好，十四者多生天上，十五者或為帝王，十六者宿智命通，十七者有求皆從，十八者眷屬歡樂，十九者諸橫消滅，二十者業道永除，二十一者去處盡通，二十二者夜夢安樂，二十三者先亡離苦，二十四者宿福受生，二十五者諸聖讚歎，二十六者聰明利根，二十七者饒慈愍心，二十八者畢竟成佛。」\n\n「復次，虛空藏菩薩！若現在未來，天龍鬼神，聞地藏名，禮地藏形，或聞地藏本願事行，讚歎瞻禮，得七種利益：一者速超聖地，二者惡業銷滅，三者諸佛護臨，四者菩提不退，五者增長本力，六者宿命皆通，七者畢竟成佛。」\n\n爾時，十方一切諸來不可說不可說諸佛如來，及大菩薩、天龍八部，聞釋迦牟尼佛，稱揚讚歎地藏菩薩，大威神力，不可思議，歎未曾有。是時忉利天，雨無量香華，天衣珠瓔，供養釋迦牟尼佛，及地藏菩薩已。一切眾會，俱復瞻禮，合掌而退。"]

function getSutra(sutraId){
  for (var i=0;i<LIB.length;i++) if (LIB[i].id === sutraId) return LIB[i];
  for (var j=0;j<state.customSutras.length;j++) if (state.customSutras[j].id === sutraId) return state.customSutras[j];
  return null;
}
function chaptersOf(sutra){ return sutra.chapters; }
function fullTextOf(sutra){
  if (sutra.text != null) return sutra.text;
  if (sutra.chapters) {
    return sutra.chapters.map(function(c){
      var head = (c.vol ? (c.vol+' · ') : '') + c.title;
      return head + '\n\n' + c.text;
    }).join('\n\n');
  }
  return '';
}

function todaysReps(plan){
  if (plan.repsDate !== todayStr()) return 0;
  return plan.repsToday || 0;
}

function getTodayTask(plan){
  var sutra = getSutra(plan.sutraId);
  if (!sutra) return null;
  var target = plan.dailyTarget || 1;
  var reps = todaysReps(plan);
  var doneToday = reps >= target;
  if (plan.mode === 'daily') {
    var rangeLabel = sutra.chapters ? ('全文一遍（共 '+sutra.chapters.length+' '+sutra.unit+'）') : '全文一遍';
    return { plan: plan, sutra: sutra, kind:'daily', label: sutra.short, rangeLabel: rangeLabel, text: fullTextOf(sutra), doneToday: doneToday, count: plan.totalCount, reps: reps, target: target };
  }
  var chs = chaptersOf(sutra);
  var idx = plan.currentIndex;
  if (idx >= chs.length) return { plan: plan, sutra: sutra, kind:'split', finished: true };
  var ch = chs[idx];
  var volPart = ch.vol ? (ch.vol + ' · ') : '';
  return { plan: plan, sutra: sutra, kind:'split', label: sutra.short, rangeLabel: '第 '+(idx+1)+' / '+chs.length+' '+sutra.unit+' · '+volPart+ch.title, text: ch.text, doneToday: doneToday, dayIndex: idx, reps: reps, target: target };
}

function markStampDate(dateStr){
  state.stampDates[dateStr] = true;
  var streakNow = computeStreak();
  if (streakNow > state.longestStreak) state.longestStreak = streakNow;
}
function computeStreak(){
  var d = new Date();
  var count = 0;
  var todayKey = todayStr(d);
  if (!state.stampDates[todayKey]) { d.setDate(d.getDate()-1); }
  while (true) {
    var key = todayStr(d);
    if (state.stampDates[key]) { count++; d.setDate(d.getDate()-1); } else break;
  }
  return count;
}
function computeMonthCount(){
  var now = new Date(); var y = now.getFullYear(); var m = now.getMonth();
  var c = 0;
  Object.keys(state.stampDates).forEach(function(k){
    var parts = k.split('-'); if (+parts[0]===y && (+parts[1]-1)===m) c++;
  });
  return c;
}

function stampPlan(planId){
  var plan = null;
  for (var i=0;i<state.plans.length;i++) if (state.plans[i].id===planId) plan = state.plans[i];
  if (!plan) return;
  var today = todayStr();
  if (plan.repsDate !== today) { plan.repsDate = today; plan.repsToday = 0; }
  var target = plan.dailyTarget || 1;
  if (plan.repsToday >= target) return;
  plan.repsToday += 1;
  if (plan.repsToday >= target) {
    var sutra = getSutra(plan.sutraId);
    if (plan.mode === 'daily') {
      plan.totalCount = (plan.totalCount||0) + 1;
    } else {
      var chs = chaptersOf(sutra);
      plan.currentIndex = Math.min(plan.currentIndex + 1, chs.length);
    }
    plan.lastStampDate = today;
    markStampDate(today);
  }
  saveState();
}

function createPlan(sutraId, target, explicitMode){
  var sutra = getSutra(sutraId);
  var mode = explicitMode || (sutra.chapters ? 'split' : 'daily');
  var id = 'p' + (state.nextId++);
  state.plans.push({ id:id, sutraId:sutraId, mode:mode, totalCount:0, currentIndex:0, lastStampDate:null, paused:false, createdAt: todayStr(), dailyTarget: target||1, repsDate:null, repsToday:0 });
  saveState();
  return id;
}
function deletePlan(planId){
  state.plans = state.plans.filter(function(p){ return p.id !== planId; });
  saveState();
}
function togglePause(planId){
  state.plans.forEach(function(p){ if (p.id===planId) p.paused = !p.paused; });
  saveState();
}
function restartPlan(planId){
  state.plans.forEach(function(p){ if (p.id===planId){ p.currentIndex = 0; p.lastStampDate = null; } });
  saveState();
}
function addCustomSutra(name, text){
  var id = 'c' + (state.nextId++);
  state.customSutras.push({ id:id, name:name, short:name, kind:'經', translator:'自訂', unit:null, text:text, chapters:null, custom:true });
  saveState();
  return id;
}
function deleteCustomSutra(id){
  state.customSutras = state.customSutras.filter(function(s){ return s.id !== id; });
  state.plans = state.plans.filter(function(p){ return p.sutraId !== id; });
  saveState();
}
function addEntry(text, tags, rangeLabel, sutraName){
  var now = new Date();
  var hour = now.getHours();
  var tod = hour < 11 ? '晨讀' : (hour < 18 ? '日間' : '夜讀');
  var wd = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
  state.entries.unshift({
    id: 'e' + (state.nextId++),
    dateLabel: (now.getMonth()+1)+' 月 '+now.getDate()+' 日 · '+wd,
    tod: tod, rangeLabel: rangeLabel, sutraName: sutraName, text: text, tags: tags
  });
  saveState();
}

/* ===================== render ===================== */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function paras(text){ return (text||'').split(/\n\n+/).map(function(p){ return '<p>'+esc(p).replace(/\n/g,'<br>')+'</p>'; }).join(''); }

function go(btn){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(btn.dataset.scr).classList.add('active');
  if (btn.dataset.scr === 'scr-plans') renderPlans();
  if (btn.dataset.scr === 'scr-journal') renderJournal();
  if (btn.dataset.scr === 'scr-library') renderLibrary();
}

function renderHeader(){
  var now = new Date();
  var hour = now.getHours();
  document.getElementById('tod-label').textContent = hour < 11 ? '晨讀時分' : (hour < 18 ? '日間持誦' : '夜讀時分');
  document.getElementById('today-date').textContent = cnNum(now.getMonth()+1)+'月'+cnNum(now.getDate())+'日';
  var wd = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()];
  document.getElementById('today-sub').textContent = now.getFullYear()+' · '+wd;
  document.getElementById('streak-n').textContent = computeStreak();
  var dayOfYear = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);
  var q = QUOTES[dayOfYear % QUOTES.length];
  document.getElementById('quote-text').textContent = q.text;
  document.getElementById('quote-src').textContent = '—— ' + q.src;
}

function renderToday(){
  renderHeader();
  var list = document.getElementById('today-list');
  list.innerHTML = '';
  var active = state.plans.filter(function(p){ return !p.paused; });
  if (!active.length) {
    list.innerHTML = '<div class="empty-note">尚無功課，到「計畫」分頁建立第一個讀經計畫吧。</div>';
    return;
  }
  var any = false;
  active.forEach(function(plan){
    var task = getTodayTask(plan);
    if (!task || task.finished) return;
    any = true;
    var btn = document.createElement('button');
    btn.className = 'task' + (task.doneToday ? ' done' : '');
    btn.onclick = function(){ openRead(plan.id); };
    var btnLabel = task.target>1 ? ('蓋印<br>'+task.reps+'/'+task.target) : '蓋印<br>打卡';
    var right = task.doneToday
      ? '<div class="seal kai" aria-hidden="true">誦</div>'
      : '<div class="stamp-btn" onclick="event.stopPropagation();quickStamp(\''+plan.id+'\')">'+btnLabel+'</div>';
    var repsBit = task.target>1 ? ('今日 '+task.reps+'/'+task.target+' 遍 · ') : '';
    var planLabel = repsBit + (task.kind==='daily' ? ('已持誦 '+task.count+' 遍') : ('計畫進度：第 '+(task.dayIndex+1)+' 天'));
    btn.innerHTML =
      '<div class="info">'+
        '<div class="t-book serif">'+esc(task.sutra.short)+'</div>'+
        '<div class="t-range">'+esc(task.rangeLabel)+'</div>'+
        '<div class="t-plan">'+esc(planLabel)+'</div>'+
      '</div>' + right;
    list.appendChild(btn);
  });
  if (!any) {
    list.innerHTML = '<div class="empty-note">今天的功課都已完成，明天再來。</div>';
  }
}

function quickStamp(planId){
  var plan = state.plans.find(function(p){ return p.id===planId; });
  var target = plan.dailyTarget || 1;
  stampPlan(planId);
  renderToday();
  var reps = todaysReps(plan);
  if (reps >= target) {
    var streak = computeStreak();
    toast('已蓋印 · 連續第 '+streak+' 日');
  } else {
    toast('已誦 '+reps+'/'+target+' 遍，再誦 '+(target-reps)+' 遍完成今日打卡');
  }
}
function hasAnyStampToday(){ return !!state.stampDates[todayStr()]; }

var currentReadPlanId = null;
function openRead(planId){
  currentReadPlanId = planId;
  var plan = state.plans.find(function(p){ return p.id===planId; });
  var task = getTodayTask(plan);
  if (!task || task.finished) return;
  document.getElementById('read-title').textContent = task.sutra.short;
  var repsBit = task.target>1 ? ('　·　今日 '+task.reps+'/'+task.target+' 遍') : '';
  document.getElementById('read-sub').textContent = task.rangeLabel + (task.sutra.translator ? (' · '+task.sutra.translator) : '') + repsBit;
  document.getElementById('read-body').innerHTML = paras(task.text);
  var btn = document.getElementById('read-stamp-btn');
  if (task.doneToday) { btn.textContent = '今天已誦滿'; btn.disabled = true; btn.style.opacity = 0.5; }
  else { btn.textContent = task.target>1 ? ('蓋印（第 '+(task.reps+1)+'/'+task.target+' 遍）') : '蓋印打卡'; btn.disabled = false; btn.style.opacity = 1; }
  showSheet('sheet-read');
}
function stampFromSheet(){
  if (!currentReadPlanId) return;
  var plan = state.plans.find(function(p){ return p.id===currentReadPlanId; });
  var taskBefore = getTodayTask(plan);
  var target = plan.dailyTarget || 1;
  stampPlan(currentReadPlanId);
  var reps = todaysReps(plan);
  renderToday();
  if (reps >= target) {
    var streak = computeStreak();
    closeSheet();
    toast('已蓋印 · 連續第 '+streak+' 日');
    pendingNote = { rangeLabel: taskBefore.rangeLabel, sutraName: taskBefore.sutra.short };
    setTimeout(function(){ openNote(pendingNote); }, 380);
  } else {
    toast('已誦 '+reps+'/'+target+' 遍，再誦 '+(target-reps)+' 遍完成今日打卡');
    openRead(currentReadPlanId);
  }
}

function writeNoteFromRead(){
  if (!currentReadPlanId) return;
  var plan = state.plans.find(function(p){ return p.id===currentReadPlanId; });
  var task = getTodayTask(plan);
  closeSheet();
  var prefill = task && !task.finished ? { rangeLabel: task.rangeLabel, sutraName: task.sutra.short } : { rangeLabel:'', sutraName:'' };
  setTimeout(function(){ openNote(prefill); }, 320);
}
function openFreeNote(){
  openNote({ rangeLabel:'', sutraName:'自由心得' });
}

var pendingNote = null;
function openNote(prefill){
  pendingNote = prefill || { rangeLabel:'', sutraName:'' };
  document.getElementById('note-sub').textContent = (pendingNote.sutraName||'') + (pendingNote.rangeLabel ? (' · '+pendingNote.rangeLabel) : '');
  document.getElementById('note-text').value = '';
  document.querySelectorAll('#mood-row .mood').forEach(function(m){ m.classList.remove('on'); });
  showSheet('sheet-note');
  setTimeout(function(){ document.getElementById('note-text').focus(); }, 320);
}
function mood(btn){ btn.classList.toggle('on'); }
function saveNote(){
  var txt = document.getElementById('note-text').value.trim();
  if (!txt) { toast('寫一句也好'); return; }
  var tags = Array.prototype.slice.call(document.querySelectorAll('#mood-row .mood.on')).map(function(m){ return m.textContent; });
  addEntry(txt, tags, pendingNote ? pendingNote.rangeLabel : '', pendingNote ? pendingNote.sutraName : '');
  closeSheet();
  renderJournal();
  toast('已記下 · 可在「日誌」回顧');
}

function renderJournal(){
  var sub = document.getElementById('journal-sub');
  var list = document.getElementById('entry-list');
  if (!state.entries.length) {
    sub.textContent = '尚無心得';
    list.innerHTML = '<div class="empty-note">打卡後可以寫下第一則心得。</div>';
    return;
  }
  sub.innerHTML = '已寫下 <span>'+state.entries.length+'</span> 則心得';
  list.innerHTML = state.entries.map(function(e){
    return '<div class="entry">'+
      '<div class="e-meta"><span>'+esc(e.dateLabel)+'</span><span>'+esc(e.tod)+'</span></div>'+
      '<div class="e-range serif">'+esc(e.sutraName)+(e.rangeLabel?(' · '+esc(e.rangeLabel)):'')+'</div>'+
      '<div class="e-body">'+esc(e.text)+'</div>'+
      (e.tags && e.tags.length ? ('<div class="e-tags">'+e.tags.map(function(t){ return '<span class="chip">'+esc(t)+'</span>'; }).join('')+'</div>') : '')+
    '</div>';
  }).join('');
}

function renderPlans(){
  document.getElementById('stat-month').textContent = computeMonthCount();
  document.getElementById('stat-longest').textContent = Math.max(state.longestStreak, computeStreak());
  document.getElementById('stat-notes').textContent = state.entries.length;

  var list = document.getElementById('plan-list');
  if (!state.plans.length) {
    list.innerHTML = '<div class="empty-note">還沒有計畫，點下方按鈕建立第一個。</div>';
  } else {
    list.innerHTML = state.plans.map(function(plan){
      var sutra = getSutra(plan.sutraId);
      if (!sutra) return '';
      var target = plan.dailyTarget || 1;
      var targetBit = target>1 ? (' · 每天 '+target+' 遍') : '';
      var pctHtml, subHtml;
      if (plan.mode === 'daily') {
        pctHtml = '常課';
        subHtml = '每日全文一遍'+targetBit+' · 已誦 '+plan.totalCount+' 次 · 自 '+plan.createdAt+' 開始';
      } else {
        var total = chaptersOf(sutra).length;
        var idx = Math.min(plan.currentIndex, total);
        var pct = Math.round(idx/total*100);
        if (idx >= total) {
          pctHtml = '已讀畢';
          subHtml = '共 '+total+' '+sutra.unit+'，已全部誦畢一輪';
        } else {
          pctHtml = pct+'%';
          subHtml = '第 '+idx+' / '+total+' '+sutra.unit+' · 每日一'+sutra.unit+targetBit;
        }
      }
      var barPct = plan.mode==='daily' ? Math.min(plan.totalCount*3,100) : Math.round(Math.min(plan.currentIndex,chaptersOf(sutra).length)/chaptersOf(sutra).length*100);
      var finished = plan.mode==='split' && plan.currentIndex >= chaptersOf(sutra).length;
      return '<div class="plan'+(plan.paused?' paused':'')+'">'+
        '<div class="p-top"><span class="p-name serif">'+esc(sutra.short)+'</span><span class="p-pct">'+pctHtml+'</span></div>'+
        '<div class="p-sub">'+esc(subHtml)+'</div>'+
        '<div class="bar"><i style="width:'+barPct+'%"></i></div>'+
        '<div class="p-actions">'+
          (finished ? '<button onclick="restartPlan(\''+plan.id+'\');renderPlans();toast(\'已重新開始\')">重新開始</button>' :
            '<button onclick="togglePause(\''+plan.id+'\');renderPlans();renderToday()">'+(plan.paused?'繼續':'暫停')+'</button>')+
          '<button onclick="openEditTarget(\''+plan.id+'\')">改遍數</button>'+
          '<button onclick="deletePlan(\''+plan.id+'\');renderPlans();renderToday();toast(\'已刪除\')">刪除</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }
  renderCalendar();
}

function renderCalendar(){
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  document.getElementById('cal-title').textContent = cnYear(y)+' · '+cnNum(m+1)+'月';
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(function(w){
    var el = document.createElement('div'); el.className='wd'; el.textContent=w; grid.appendChild(el);
  });
  var firstDow = new Date(y,m,1).getDay();
  var daysInMonth = new Date(y,m+1,0).getDate();
  var todayD = now.getDate();
  for (var i=0;i<firstDow;i++) grid.appendChild(document.createElement('div'));
  for (var d=1; d<=daysInMonth; d++){
    var el = document.createElement('div'); el.className='day'; el.textContent=d;
    var key = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if (d < todayD) el.classList.add(state.stampDates[key] ? 'stamped' : 'missed');
    else if (d === todayD) { el.classList.add('today-cell'); if (state.stampDates[key]) el.classList.add('stamped'); }
    else el.classList.add('future');
    grid.appendChild(el);
  }
}

function allSutraOptions(){ return LIB.concat(state.customSutras); }

function renderLibrary(){
  var list = document.getElementById('lib-list');
  list.innerHTML = allSutraOptions().map(function(s){
    var lenLabel = s.chapters ? ('共 '+s.chapters.length+' '+s.unit) : '全文';
    return '<button class="lib-item" onclick="openLibView(\''+s.id+'\')">'+
      '<div style="flex:1;min-width:0">'+
        '<div class="li-name serif">'+esc(s.short||s.name)+'</div>'+
        '<div class="li-sub">'+esc(s.translator||'')+(s.translator?' · ':'')+lenLabel+'</div>'+
      '</div>'+
      '<span class="badge'+(s.kind==='咒'?' zhou':'')+'">'+esc(s.kind||'經')+'</span>'+
    '</button>';
  }).join('');
}

function openLibView(sutraId){
  var s = getSutra(sutraId);
  document.getElementById('libview-title').textContent = s.name || s.short;
  document.getElementById('libview-sub').textContent = s.translator || '自訂經文';
  var body;
  if (s.chapters) {
    body = s.chapters.map(function(c){
      var head = (c.vol ? (c.vol+' · ') : '') + c.title;
      return '<p style="font-weight:600;letter-spacing:.05em">'+esc(head)+'</p>' + paras(c.text);
    }).join('');
  } else {
    body = paras(s.text);
  }
  document.getElementById('libview-body').innerHTML = body;
  var delBtn = document.getElementById('libview-del');
  if (s.custom) { delBtn.style.display='block'; delBtn.onclick = function(){ deleteCustomSutra(s.id); closeSheet(); renderLibrary(); renderPlans(); toast('已刪除'); }; }
  else delBtn.style.display = 'none';
  showSheet('sheet-libview');
}

/* ===================== new plan sheet ===================== */
var selectedSutraId = null;
var pendingTarget = 1;
var pendingMode = 'daily';
function openNewPlan(){
  selectedSutraId = null;
  pendingTarget = 1;
  pendingMode = 'daily';
  document.getElementById('plan-create-btn').disabled = true;
  document.getElementById('plan-preview').classList.remove('show');
  document.getElementById('target-row').classList.remove('show');
  document.getElementById('mode-row').classList.remove('show');
  document.getElementById('target-n').textContent = '1';
  var grid = document.getElementById('plan-picker');
  grid.innerHTML = allSutraOptions().map(function(s){
    var sub = s.chapters ? ('可分卷或念全文 · 共 '+s.chapters.length+' '+s.unit) : '每日定課 · 全文一遍';
    return '<div class="pick-item" data-id="'+s.id+'" onclick="pickSutra(\''+s.id+'\')">'+
      '<div style="flex:1"><div class="pi-name">'+esc(s.short||s.name)+'</div><div class="pi-sub">'+esc(sub)+'</div></div>'+
      '<span class="badge'+(s.kind==='咒'?' zhou':'')+'">'+esc(s.kind||'經')+'</span>'+
    '</div>';
  }).join('');
  showSheet('sheet-newplan');
}
function pickSutra(id){
  selectedSutraId = id;
  pendingTarget = 1;
  document.getElementById('target-n').textContent = '1';
  document.querySelectorAll('#plan-picker .pick-item').forEach(function(el){ el.classList.toggle('sel', el.dataset.id===id); });
  var s = getSutra(id);
  var modeRow = document.getElementById('mode-row');
  if (s.chapters) {
    pendingMode = 'split';
    modeRow.classList.add('show');
    updateModeButtons();
  } else {
    pendingMode = 'daily';
    modeRow.classList.remove('show');
  }
  document.getElementById('target-row').classList.add('show');
  updatePlanPreview();
  document.getElementById('plan-create-btn').disabled = false;
}
function pickMode(m){
  pendingMode = m;
  updateModeButtons();
  updatePlanPreview();
}
function updateModeButtons(){
  document.querySelectorAll('#mode-row [data-mode]').forEach(function(b){
    b.classList.toggle('on', b.dataset.mode===pendingMode);
  });
}
function bumpTarget(delta){
  pendingTarget = Math.max(1, Math.min(108, pendingTarget + delta));
  document.getElementById('target-n').textContent = pendingTarget;
  updatePlanPreview();
}
function updatePlanPreview(){
  if (!selectedSutraId) return;
  var s = getSutra(selectedSutraId);
  var prev = document.getElementById('plan-preview');
  var timesBit = pendingTarget>1 ? ('每天 '+pendingTarget+' 遍') : '每天一遍';
  if (s.chapters && pendingMode === 'split') {
    prev.textContent = '將建立分卷計畫：'+s.short+'，每天誦一'+s.unit+'（'+timesBit+'），共 '+s.chapters.length+' 天讀畢一輪。';
  } else if (s.chapters && pendingMode === 'daily') {
    prev.textContent = '將建立每日定課：'+s.short+'，每天誦全文（共 '+s.chapters.length+' '+s.unit+'），'+timesBit+'，長期持續，不設結束日。';
  } else {
    prev.textContent = '將建立每日定課：'+(s.short||s.name)+'，'+timesBit+'，長期持續，不設結束日。';
  }
  prev.classList.add('show');
}
function createPlanConfirm(){
  if (!selectedSutraId) return;
  createPlan(selectedSutraId, pendingTarget, pendingMode);
  closeSheet();
  renderPlans(); renderToday();
  toast('計畫已建立');
}

/* ===================== edit daily target ===================== */
var editTargetPlanId = null;
var editTargetValue = 1;
function openEditTarget(planId){
  editTargetPlanId = planId;
  var plan = state.plans.find(function(p){ return p.id===planId; });
  var sutra = getSutra(plan.sutraId);
  editTargetValue = plan.dailyTarget || 1;
  document.getElementById('edit-target-sub').textContent = (sutra ? (sutra.short||sutra.name) : '') + ' · 每天讀幾遍';
  document.getElementById('edit-target-n').textContent = editTargetValue;
  showSheet('sheet-target');
}
function bumpEditTarget(delta){
  editTargetValue = Math.max(1, Math.min(108, editTargetValue + delta));
  document.getElementById('edit-target-n').textContent = editTargetValue;
}
function saveEditTarget(){
  var plan = state.plans.find(function(p){ return p.id===editTargetPlanId; });
  if (plan) { plan.dailyTarget = editTargetValue; saveState(); }
  closeSheet();
  renderPlans(); renderToday();
  toast('已更新每日遍數');
}

/* ===================== add custom sutra ===================== */
function openAddSutra(){
  document.getElementById('sutra-name').value = '';
  document.getElementById('sutra-text').value = '';
  showSheet('sheet-addsutra');
}
function saveCustomSutra(){
  var name = document.getElementById('sutra-name').value.trim();
  var text = document.getElementById('sutra-text').value.trim();
  if (!name || !text) { toast('經名與內文都要填'); return; }
  addCustomSutra(name, text);
  closeSheet();
  renderLibrary();
  toast('已加入經庫');
}
function deleteCustomFromView(){ /* wired per-open in openLibView */ }

/* ===================== sheets ===================== */
function showSheet(id){
  document.getElementById('overlay').classList.add('show');
  document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('show'); });
  document.getElementById(id).classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.sheet').forEach(function(s){ s.classList.remove('show'); });
}

var toastTimer;
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

/* ===================== boot ===================== */
state = loadState() || seedState();
if (!state.customSutras) state.customSutras = [];
if (typeof state.longestStreak !== 'number') state.longestStreak = 0;
if (typeof state.nextId !== 'number') state.nextId = 100;
state.plans.forEach(function(p){
  if (typeof p.dailyTarget !== 'number') p.dailyTarget = 1;
  if (typeof p.repsToday !== 'number') p.repsToday = 0;
  if (typeof p.repsDate === 'undefined') p.repsDate = null;
});
saveState();
renderToday();
setInterval(renderHeader, 30000);
</script>
